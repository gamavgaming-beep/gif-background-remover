<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | FIXED 100%</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --surface: #121826;
            --accent: #6366f1;
        }

        body {
            margin: 0; padding: 15px; font-family: 'Inter', sans-serif;
            background: #0b0f1a; color: #fff; display: flex; flex-direction: column; align-items: center;
        }

        .header h1 {
            font-size: 24px; font-weight: 900; 
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin: 15px 0;
        }

        .container {
            width: 100%; max-width: 450px; background: var(--surface);
            border-radius: 28px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }

        /* Centered Preview */
        .preview-box {
            width: 100%; aspect-ratio: 1/1; background: #fff;
            background-image: conic-gradient(#eee 0.25turn, #fff 0.25turn 0.5turn, #eee 0.5turn 0.75turn, #fff 0.75turn);
            background-size: 20px 20px; border-radius: 20px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            margin-bottom: 15px;
        }

        #hintText { position: absolute; color: #888; font-weight: 800; font-size: 14px; text-align: center; }
        canvas { max-width: 95%; max-height: 95%; z-index: 5; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Meta Data */
        .meta-info {
            display: flex; justify-content: space-between; font-size: 11px;
            color: var(--primary); font-weight: 800; padding: 10px;
            background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 15px;
        }

        .panel { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 12px; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 8px; }

        /* FPS Toggle */
        select, .res-input {
            width: 100%; background: #0b0f1a; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 10px; font-weight: 700; outline: none; box-sizing: border-box;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        /* Sliders */
        .slider-wrap { margin-bottom: 12px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid #fff; }

        /* Progress Screen */
        #progressUI {
            position: fixed; inset: 0; background: #0b0f1a;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #percentNum { font-size: 80px; font-weight: 900; color: var(--primary); margin: 0; }

        .btn-main {
            width: 100%; padding: 18px; background: var(--primary); color: #000;
            border: none; border-radius: 18px; font-size: 15px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="progressUI">
    <p id="percentNum">0%</p>
    <p style="letter-spacing: 3px; font-weight: 800; color: #666;">PROCESSING...</p>
</div>

<div class="header"><h1>Giphy Pro Studio</h1></div>

<div class="container">
    <div class="preview-box">
        <input type="file" id="gifIn" accept="image/gif">
        <canvas id="cvs"></canvas>
        <div id="hintText">TAP TO LOAD GIF</div>
    </div>

    <div class="meta-info">
        <span id="txtRes">0x0</span>
        <span id="txtFrames">0 FRAMES</span>
    </div>

    <div class="panel">
        <label>Canvas Resolution</label>
        <div class="grid-2">
            <input type="number" id="wIn" class="res-input" value="512">
            <input type="number" id="hIn" class="res-input" value="512">
        </div>
        <label>Frame Rate</label>
        <select id="fpsIn">
            <option value="83">12 fps</option>
            <option value="66">15 fps</option>
            <option value="40">25 fps</option>
            <option value="33" selected>30 fps</option>
        </select>
    </div>

    <div class="panel">
        <div class="slider-wrap">
            <div class="slider-head"><span>Fit Area</span><span id="fitVal">70%</span></div>
            <input type="range" id="fitSl" min="30" max="95" value="70">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Shadow</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Stroke</span><span id="strVal">10px</span></div>
            <input type="range" id="strSl" min="0" max="30" value="10">
        </div>
    </div>

    <button class="btn-main" id="btnGo">Generate & Download</button>
</div>

<script>
    const gifIn = document.getElementById('gifIn'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), fpsIn = document.getElementById('fpsIn');
    const fitSl = document.getElementById('fitSl'), shdSl = document.getElementById('shdSl'), strSl = document.getElementById('strSl');
    const btnGo = document.getElementById('btnGo'), progUI = document.getElementById('progressUI'), pNum = document.getElementById('percentNum');

    let frames = [], cur = 0, timer = null, ow, oh;

    gifIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hintText').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('txtRes').innerText = ow+'x'+oh;
        document.getElementById('txtFrames').innerText = frames.length + ' FRAMES';
        cvs.width = wIn.value; cvs.height = hIn.value;
        start();
    };

    function start() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, parseInt(fpsIn.value));
    }

    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const t = document.createElement('canvas'); t.width = W; t.height = H;
        const tx = t.getContext('2d');
        const sc = fitSl.value/100, r = ow/oh;
        let dw = (r > W/H) ? W*sc : (H*sc)*r, dh = (r > W/H) ? (W*sc)/r : H*sc;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        for (let i=0; i<d.length; i+=4) if(d[i]>240 && d[i+1]>240 && d[i+2]>240) d[i+3]=0;
        tx.putImageData(id, 0, 0);

        const o = document.createElement('canvas'); o.width = W; o.height = H;
        const ox = o.getContext('2d');
        if(shdSl.value > 0) { ox.shadowColor = 'rgba(0,0,0,0.3)'; ox.shadowBlur = 15; ox.shadowOffsetY = 8; }
        
        const s = parseInt(strSl.value);
        if(s > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = "#fff";
            for(let x=-s; x<=s; x+=2) for(let y=-s; y<=s; y+=2) sx.drawImage(t, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(t, 0, 0);
            ox.drawImage(sx.canvas, 0, 0);
        } else ox.drawImage(t, 0, 0);
        return o;
    }

    function draw() { if(frames.length) { ctx.clearRect(0,0,cvs.width,cvs.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    btnGo.onclick = () => {
        if(!frames.length) return;
        progUI.style.display = 'flex';
        // USE BLOB WORKER TO PREVENT HANGING
        const gif = new GIF({ 
            workers: 2, quality: 10, width: parseInt(wIn.value), height: parseInt(hIn.value),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
        });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: parseInt(fpsIn.value), copy: true}));
        gif.on('progress', p => pNum.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'sticker.gif'; a.click();
            progUI.style.display = 'none';
        });
        gif.render();
    };

    [wIn, hIn, fitSl, shdSl, strSl].forEach(el => el.oninput = () => {
        if(el.id.includes('Sl')) document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + (el.id==='strSl'?'px':'%');
        cvs.width = wIn.value; cvs.height = hIn.value; draw();
    });
    fpsIn.onchange = start;
</script>
</body>
</html>
