<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Professional Sticker Tool</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --accent: #6157ff; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .editor-container { background: var(--panel); padding: 25px; border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid #333; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { background: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .preview-box { width: 100%; aspect-ratio: 1/1; background: #252525; background-image: repeating-conic-gradient(#333 0 90deg, #252525 0 180deg); background-size: 20px 20px; border-radius: 16px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px dashed #444; }
        canvas { width: 100%; height: 100%; image-rendering: auto; }
        .stats { background: #000; padding: 12px; border-radius: 12px; margin: 15px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; border: 1px solid #333; }
        .stat-item span { color: #888; display: block; margin-bottom: 2px; }
        .control-group { margin-bottom: 18px; }
        label { font-size: 12px; font-weight: 600; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-success { background: #00c853; color: white; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; background: #333; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="prog">0%</h1>
    <p>Rendering 30fps Professional GIF...</p>
</div>

<div class="editor-container">
    <div class="preview-header">
        <span style="font-weight: bold;">LIVE PREVIEW</span>
        <span class="badge">GIPHY READY 1:1</span>
    </div>
    
    <div class="preview-box">
        <canvas id="c"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
        <div id="msg">Drop or Click to Upload</div>
    </div>

    <div class="stats">
        <div class="stat-item"><span>Original Size</span><b id="origS">0 x 0</b></div>
        <div class="stat-item"><span>Output Format</span><b>540 x 540 (1:1)</b></div>
    </div>

    <button class="btn btn-primary" onclick="document.getElementById('up').click()">LOAD NEW ASSET</button>

    <div class="control-group">
        <label>Object Scale (Fit) <span id="scV">80%</span></label>
        <input type="range" id="scS" min="10" max="100" value="80">
    </div>

    <div class="color-row control-group">
        <div><label>Target BG</label><input type="color" id="bgC" value="#ffffff"></div>
        <div><label>Stroke</label><input type="color" id="stC" value="#000000"></div>
    </div>

    <div class="control-group">
        <label>Stroke Weight <span id="wV">8px</span></label>
        <input type="range" id="wS" min="0" max="30" value="8">
    </div>

    <div class="control-group">
        <label>BG Tolerance <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">
    </div>

    <button class="btn btn-success" id="dl">EXPORT AS GIPHY STICKER</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const scS = document.getElementById('scS'), tS = document.getElementById('tS'), wS = document.getElementById('wS'), bgC = document.getElementById('bgC'), stC = document.getElementById('stC');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog'), origS = document.getElementById('origS');

    let frames = [], delays = [], cur = 0, tid = null, ow = 0, oh = 0;
    const TARGET_SIZE = 540;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('msg').style.display = 'none';
        loader.style.display = 'flex';
        
        try {
            const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            frames = res.map(f => f.getImage());
            delays = res.map(f => 33.3); // Forced 30 FPS logic (1000ms / 30 = 33.3ms)
            
            ow = frames[0].width; oh = frames[0].height;
            origS.innerText = ow + " x " + oh;
            
            c.width = TARGET_SIZE; c.height = TARGET_SIZE;
            
            if(tid) clearInterval(tid);
            tid = setInterval(() => { draw(cur); cur = (cur+1)%frames.length; }, 33.3);
        } catch (err) { alert("Upload failed. Try another GIF."); }
        loader.style.display = 'none';
    };

    function process(img, isExport = false) {
        const tc = document.createElement('canvas');
        tc.width = TARGET_SIZE; tc.height = TARGET_SIZE;
        const tx = tc.getContext('2d');
        
        const scale = parseFloat(scS.value) / 100;
        const aspect = ow / oh;
        let dw, dh;
        
        if (aspect > 1) { dw = TARGET_SIZE * scale; dh = dw / aspect; }
        else { dh = TARGET_SIZE * scale; dw = dh * aspect; }
        
        const dx = (TARGET_SIZE - dw) / 2;
        const dy = (TARGET_SIZE - dh) / 2;

        tx.clearRect(0, 0, TARGET_SIZE, TARGET_SIZE);
        tx.drawImage(img, dx, dy, dw, dh);

        const id = tx.getImageData(0,0,TARGET_SIZE,TARGET_SIZE), d = id.data;
        const target = hex(bgC.value), tol = tS.value * 2.55;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255; 
        }
        tx.putImageData(id, 0, 0);

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = TARGET_SIZE; sc.height = TARGET_SIZE;
            const sx = sc.getContext('2d');
            sx.fillStyle = stC.value;
            for(let x = -stroke; x <= stroke; x++) {
                for(let y = -stroke; y <= stroke; y++) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value; sx.fillRect(0,0,TARGET_SIZE,TARGET_SIZE);
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw(i) {
        if(!frames[i]) return;
        ctx.clearRect(0, 0, TARGET_SIZE, TARGET_SIZE);
        ctx.drawImage(process(frames[i], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ 
            workers: 4, quality: 5, 
            workerScript: URL.createObjectURL(b), 
            transparent: 'rgba(0,0,0,0)',
            width: TARGET_SIZE, height: TARGET_SIZE 
        });

        frames.forEach((f, i) => {
            gif.addFrame(process(f, true), {delay: 33.3, copy: true, disposal: 2});
        });

        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "giphy_pro_sticker.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hex(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }
    [scS, tS, wS, bgC, stC].forEach(el => el.oninput = () => {
        const v = document.getElementById(el.id.slice(0,2)+'V');
        if(v) v.innerText = el.value + (el.id==='scS'?'%':'px');
        if(frames.length) draw(cur);
    });
</script>
</body>
</html>
