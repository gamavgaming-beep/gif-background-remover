<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Background Remover - Chroma Key</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.rawgit.com/jnordberg/gif.js/master/dist/gif.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        canvas { max-width: 100%; border: 1px solid #ddd; background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
        .controls { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        input[type="range"] { width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>GIF Background Remover (Chroma Key)</h2>
    
    <input type="file" id="upload" accept="image/gif"><br><br>
    
    <canvas id="preview"></canvas>

    <div class="controls">
        <div>
            <label>Pick Color:</label>
            <input type="color" id="bgColor" value="#00ff00">
        </div>
        <div>
            <label>Tolerance:</label>
            <input type="range" id="tolerance" min="0" max="200" value="50">
            <span id="tolValue">50</span>
        </div>
        <button id="processBtn">Remove Background & Download</button>
    </div>

    <div id="status">Upload a GIF to start...</div>
</div>

<script>
    const upload = document.getElementById('upload');
    const preview = document.getElementById('preview');
    const ctx = preview.getContext('2d');
    const bgColorInput = document.getElementById('bgColor');
    const toleranceInput = document.getElementById('tolerance');
    const tolValue = document.getElementById('tolValue');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let gifFrames = [];

    toleranceInput.oninput = () => tolValue.innerText = toleranceInput.value;

    upload.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Extracting frames... Please wait.";
        gifFrames = [];

        // Extracting GIF frames
        gifFrames = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        
        // Show first frame in preview
        preview.width = gifFrames[0].getImage().width;
        preview.height = gifFrames[0].getImage().height;
        ctx.drawImage(gifFrames[0].getImage(), 0, 0);
        
        status.innerText = "Frames extracted. Select color and click process.";
    };

    processBtn.onclick = () => {
        if (gifFrames.length === 0) return;
        status.innerText = "Processing frames... This may take a minute.";
        processBtn.disabled = true;

        const targetColor = hexToRgb(bgColorInput.value);
        const tolerance = parseInt(toleranceInput.value);

        const gif = new GIF({
            workers: 2,
            quality: 10,
            transparent: 0x00000000 // Set transparency
        });

        gifFrames.forEach((frame, index) => {
            const canvas = frame.getImage();
            const fCtx = canvas.getContext('2d');
            const imgData = fCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                const diff = Math.sqrt(
                    Math.pow(r - targetColor.r, 2) +
                    Math.pow(g - targetColor.g, 2) +
                    Math.pow(b - targetColor.b, 2)
                );

                if (diff < tolerance) {
                    data[i + 3] = 0; // Set Alpha to 0 (Transparent)
                }
            }
            fCtx.putImageData(imgData, 0, 0);
            gif.addFrame(canvas, { delay: frame.frameInfo.delay * 10 });
        });

        gif.on('finished', (blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "transparent_bg.gif";
            a.click();
            status.innerText = "Done! Downloaded.";
            processBtn.disabled = false;
        });

        gif.render();
    };

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : null;
    }
</script>

</body>
</html>
