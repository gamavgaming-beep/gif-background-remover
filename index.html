<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra GIF BG Remover</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1a1a1a;
  align-items: center;
}

.export {
  background: linear-gradient(45deg,#00eaff,#a855f7);
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  color: white;
  box-shadow: 0 0 15px #00eaff;
  cursor: pointer;
}

/* UPLOAD */
.upload-box {
  border: 2px dashed #00eaff;
  margin: 20px;
  padding: 40px;
  text-align: center;
  border-radius: 15px;
  cursor: pointer;
}

/* PREVIEW */
.preview {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 10px;
}

.preview img {
  width: 45%;
  border-radius: 10px;
  background: #222;
}

/* CONTROLS */
.controls {
  padding: 20px;
  text-align: center;
}

.controls input {
  width: 80%;
}

/* FOOTER PANEL */
.bottom-panel {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1a1a1a;
  padding: 10px;
  display: flex;
  justify-content: space-around;
}
</style>

</head>

<body>

<div class="topbar">
  <button onclick="goBack()">←</button>
  <h3>GIF BG REMOVER</h3>
  <button class="export" onclick="exportGIF()">Export</button>
</div>

<div class="upload-box" onclick="upload.click()">
  Upload GIF
  <input type="file" id="upload" accept="image/gif" hidden>
</div>

<div class="preview">
  <img id="original">
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <p>Threshold</p>
  <input type="range" id="threshold" min="0" max="255" value="120">
  <br><br>
  <button onclick="removeBG()">Remove Background</button>
</div>

<div class="bottom-panel">
  <button onclick="zoomIn()">Zoom +</button>
  <button onclick="zoomOut()">Zoom -</button>
</div>

<script>
let img = new Image();
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

upload.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  img.src = url;
  document.getElementById("original").src = url;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
  };
};

function removeBG() {
  let threshold = document.getElementById("threshold").value;

  ctx.drawImage(img, 0, 0);
  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    // Simple background remove (white detect)
    if (r > threshold && g > threshold && b > threshold) {
      data[i + 3] = 0;
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

function exportGIF() {
  let link = document.createElement("a");
  link.download = "output.png";
  link.href = canvas.toDataURL();
  link.click();
}

function zoomIn() {
  canvas.style.transform = "scale(1.2)";
}

function zoomOut() {
  canvas.style.transform = "scale(1)";
}

function goBack() {
  alert("Back pressed");
}
</script>

</body>
</html>
