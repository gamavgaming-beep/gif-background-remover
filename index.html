<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giphy Pro Studio</title>

<script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<style>
:root {
    --accent:#00ff88;
    --bg:#0b0f1a;
    --surface:#171c29;
    --border:rgba(255,255,255,0.1);
}

body{
    background:var(--bg);
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
}

.app{
    max-width:520px;
    width:100%;
}

.preview{
    aspect-ratio:1/1;
    border:3px solid var(--accent);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;

    background:#fff;
    background-image:
    linear-gradient(45deg,#ddd 25%,transparent 25%),
    linear-gradient(-45deg,#ddd 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ddd 75%),
    linear-gradient(-45deg,transparent 75%,#ddd 75%);
    background-size:20px 20px;
}

canvas{max-width:100%}

.fps-wrap{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}

.fps-btn{
    padding:8px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#1a202c;
    color:#fff;
    cursor:pointer;
    font-size:12px;
}

.fps-btn.active{
    background:var(--accent);
    color:#000;
}

button.main{
    width:100%;
    margin-top:20px;
    padding:15px;
    font-weight:bold;
    background:var(--accent);
    border:none;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="app">

<div class="preview">
<input type="file" id="fileInput" accept="image/gif">
<canvas id="canvas"></canvas>
</div>

<p>FPS: <span id="fpsVal">30</span></p>

<div class="fps-wrap" id="fpsWrap"></div>

<button class="main" id="exportBtn">Generate</button>

</div>

<script>

const fpsList = [12,15,18,20,24,25,30,48,50,60];

const fpsWrap = document.getElementById("fpsWrap");
const fpsVal = document.getElementById("fpsVal");

let delay = 33;

// create buttons
fpsList.forEach(fps=>{
    const btn = document.createElement("button");
    btn.className="fps-btn";
    btn.innerText=fps+" FPS";

    btn.onclick=()=>{
        document.querySelectorAll(".fps-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        delay = Math.round(1000/fps);
        fpsVal.innerText=fps;

        if(timer){
            clearInterval(timer);
            timer=setInterval(loop,delay);
        }
    }

    fpsWrap.appendChild(btn);
});

// default active
fpsWrap.children[6].classList.add("active"); // 30 FPS

// GIF logic
const fileInput=document.getElementById("fileInput");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let frames=[],timer,i=0;

fileInput.onchange=async(e)=>{
    const file=e.target.files[0];
    const data=await gifFrames({url:URL.createObjectURL(file),frames:'all',outputType:'canvas'});
    frames=data.map(f=>f.getImage());

    canvas.width=500;
    canvas.height=500;

    if(timer) clearInterval(timer);
    timer=setInterval(loop,delay);
};

function loop(){
    if(!frames.length) return;
    ctx.clearRect(0,0,500,500);
    ctx.drawImage(frames[i],0,0,500,500);
    i=(i+1)%frames.length;
}

// EXPORT
document.getElementById("exportBtn").onclick=async()=>{
    if(!frames.length) return;

    const gif=new GIF({workers:2,quality:10,width:500,height:500});

    frames.forEach(f=>{
        gif.addFrame(f,{delay:delay});
    });

    gif.on("finished",b=>{
        const a=document.createElement("a");
        a.href=URL.createObjectURL(b);
        a.download="sticker.gif";
        a.click();
    });

    gif.render();
};

</script>

</body>
</html>
