<!DOCTYPE html>
<html>
<head>

<title>AI GIF Background Remover</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#drop{
border:2px dashed white;
padding:40px;
margin:20px;
}

canvas{
margin-top:20px;
}

button{
padding:10px;
margin:10px;
}

</style>

<script src="https://unpkg.com/gifuct-js/dist/gifuct.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

</head>

<body>

<h2>AI GIF Background Remover</h2>

<div id="drop">
Drag & Drop GIF Here
</div>

<input type="file" id="upload">

<br><br>

<label>Background Color</label>
<input type="color" id="picker" value="#00ff00">

<br>

<button onclick="processGif()">Remove Background</button>

<button onclick="downloadGif()">Export Transparent GIF</button>

<canvas id="preview"></canvas>

<script>

let frames=[];
let output;

document.getElementById("upload").onchange=loadGif;

async function loadGif(e){

let file=e.target.files[0];

let buffer=await file.arrayBuffer();

let gifData=gifuct.parseGIF(buffer);

frames=gifuct.decompressFrames(gifData,true);

alert("Frames Loaded: "+frames.length);

}

function processGif(){

let color=document.getElementById("picker").value;

let r=parseInt(color.substr(1,2),16);
let g=parseInt(color.substr(3,2),16);
let b=parseInt(color.substr(5,2),16);

let gif=new GIF({workers:2,quality:10});

frames.forEach(frame=>{

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=frame.dims.width;
canvas.height=frame.dims.height;

let imgData=ctx.createImageData(canvas.width,canvas.height);

let data=imgData.data;

for(let i=0;i<data.length;i+=4){

data[i]=frame.patch[i];
data[i+1]=frame.patch[i+1];
data[i+2]=frame.patch[i+2];
data[i+3]=255;

if(
Math.abs(data[i]-r)<20 &&
Math.abs(data[i+1]-g)<20 &&
Math.abs(data[i+2]-b)<20
){
data[i+3]=0;
}

}

ctx.putImageData(imgData,0,0);

gif.addFrame(canvas,{delay:frame.delay});

});

gif.render();

gif.on("finished",function(blob){

output=blob;

let url=URL.createObjectURL(blob);

let img=new Image();
img.src=url;

document.body.appendChild(img);

});

}

function downloadGif(){

let link=document.createElement("a");
link.href=URL.createObjectURL(output);
link.download="transparent.gif";
link.click();

}

</script>

</body>
</html>
