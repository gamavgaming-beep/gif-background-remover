<!-- FPS DROPDOWN VERSION -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Pro Editor FPS Dropdown</title>

<script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<style>
body { background:#0b0f1a; color:#fff; font-family:sans-serif; text-align:center; }
canvas { max-width:90%; margin-top:10px; }
select, input { padding:8px; margin:5px; }
button { padding:12px; background:#00ff88; border:none; font-weight:bold; }
</style>
</head>

<body>

<h2>GIF Editor (FPS Dropdown)</h2>

<input type="file" id="fileInput" accept="image/gif"><br>

<canvas id="canvas"></canvas><br>

<!-- FPS DROPDOWN -->
<label>Frame Rate (FPS)</label><br>
<select id="fpsSelect">
<option value="12">12 FPS</option>
<option value="15">15 FPS</option>
<option value="18">18 FPS</option>
<option value="20">20 FPS</option>
<option value="24" selected>24 FPS</option>
<option value="25">25 FPS</option>
<option value="30">30 FPS</option>
<option value="48">48 FPS</option>
<option value="50">50 FPS</option>
<option value="60">60 FPS</option>
</select><br>

<button id="exportBtn">Export GIF</button>

<script>

const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsSelect = document.getElementById("fpsSelect");

let frames = [];
let index = 0;
let timer;

function getDelay() {
    const fps = parseInt(fpsSelect.value);
    return 1000 / fps; // convert FPS → ms
}

fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const res = await gifFrames({
        url: URL.createObjectURL(file),
        frames: "all",
        outputType: "canvas"
    });

    frames = res.map(f => f.getImage());

    canvas.width = frames[0].width;
    canvas.height = frames[0].height;

    startPreview();
};

function startPreview() {
    if (timer) clearInterval(timer);

    timer = setInterval(() => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(frames[index],0,0);
        index = (index + 1) % frames.length;
    }, getDelay());
}

fpsSelect.onchange = () => {
    startPreview();
};

document.getElementById("exportBtn").onclick = async () => {

    if (!frames.length) return;

    const response = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
    const blob = await response.blob();
    const workerUrl = URL.createObjectURL(blob);

    const gif = new GIF({
        workers: 2,
        quality: 10,
        width: canvas.width,
        height: canvas.height,
        workerScript: workerUrl
    });

    const delay = getDelay();

    frames.forEach(f => {
        gif.addFrame(f, {delay: delay});
    });

    gif.on("finished", (blob) => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "output.gif";
        a.click();
    });

    gif.render();
};

</script>

</body>
</html>
