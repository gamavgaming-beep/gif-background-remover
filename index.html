<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | ACCURACY MASTER</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --accent: #6366f1;
            --bg: #0b0f1a;
            --surface: rgba(23, 28, 41, 0.98);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .studio-header { text-align: center; margin-bottom: 25px; }
        .studio-header h1 {
            font-size: 28px; font-weight: 900; background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        .app-shell {
            width: 100%; max-width: 480px; background: var(--surface);
            backdrop-filter: blur(25px); border-radius: 32px; padding: 24px;
            border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.6); box-sizing: border-box;
        }

        /* Preview Viewport */
        .viewport {
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: conic-gradient(#e5e7eb 0.25turn, #fff 0.25turn 0.5turn, #e5e7eb 0.5turn 0.75turn, #fff 0.75turn);
            background-size: 20px 20px; border-radius: 24px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px;
        }

        canvas { max-width: 95%; max-height: 95%; z-index: 5; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Panels */
        .panel { background: rgba(0,0,0,0.25); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        h3 { font-size: 10px; color: #64748b; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 2px; font-weight: 800; }

        .slider-row { margin-bottom: 15px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 8px; font-weight: 700; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #2d3748; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid #fff; cursor: pointer; }

        /* Color Controls */
        .color-strip { display: flex; justify-content: space-around; }
        .color-node { text-align: center; }
        .color-circle { width: 42px; height: 42px; border-radius: 50%; border: 3px solid #fff; position: relative; overflow: hidden; margin: 0 auto; }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 65px; height: 65px; cursor: pointer; border: none; }
        .color-node span { font-size: 9px; color: #64748b; font-weight: 800; display: block; margin-top: 8px; }

        /* Progress Overlay */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #pctText { font-size: 85px; font-weight: 900; color: var(--primary); margin: 0; }

        .btn-master {
            width: 100%; padding: 20px; background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0b0f1a; border: none; border-radius: 20px; font-size: 15px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; box-shadow: 0 15px 30px rgba(0, 255, 136, 0.2);
        }
    </style>
</head>
<body>

<div id="loader">
    <p id="pctText">0%</p>
    <p style="letter-spacing: 4px; color: #475569; font-weight: 800;">REFINING ACCURACY...</p>
</div>

<div class="studio-header"><h1>Giphy Pro Studio</h1></div>

<div class="app-shell">
    <div class="viewport">
        <input type="file" id="gifIn" accept="image/gif">
        <canvas id="cvs"></canvas>
        <div style="position: absolute; color: #94a3b8; font-weight: 800;">TAP TO LOAD SOURCE</div>
    </div>

    <div class="panel">
        <h3>Accuracy & Edge Control (Update)</h3>
        <div class="slider-row">
            <div class="slider-head"><span>Removal Accuracy (Threshold)</span><span id="accVal">45%</span></div>
            <input type="range" id="accSl" min="1" max="100" value="45">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Edge Smoothness</span><span id="smVal">2px</span></div>
            <input type="range" id="smSl" min="0" max="10" value="2">
        </div>
    </div>

    <div class="panel">
        <h3>Visual Style</h3>
        <div class="slider-row">
            <div class="slider-head"><span>Stroke Width</span><span id="strWVal">10px</span></div>
            <input type="range" id="strWSl" min="0" max="40" value="10">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Shadow Depth</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
    </div>

    <div class="panel">
        <div class="color-strip">
            <div class="color-node"><div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div><span>BG CLEAN</span></div>
            <div class="color-node"><div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div><span>STROKE</span></div>
            <div class="color-node"><div class="color-circle"><input type="color" id="cGl" value="#6366f1"></div><span>GLOW</span></div>
        </div>
    </div>

    <button class="btn-master" id="btnExport">Export Accurate Sticker</button>
</div>

<script>
    const gifIn = document.getElementById('gifIn'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const accSl = document.getElementById('accSl'), smSl = document.getElementById('smSl'), strWSl = document.getElementById('strWSl'), shdSl = document.getElementById('shdSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGl = document.getElementById('cGl');
    const btnExport = document.getElementById('btnExport'), loader = document.getElementById('loader'), pctText = document.getElementById('pctText');

    let frames = [], cur = 0, timer = null, ow, oh;

    gifIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        cvs.width = 512; cvs.height = 512;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, 33);
    };

    function process(img, isFinal = false) {
        const W = 512, H = 512;
        const t = document.createElement('canvas'); t.width = W; t.height = H;
        const tx = t.getContext('2d');
        tx.drawImage(img, 50, 50, 412, 412); // Auto center fit

        // Advanced Accuracy Logic
        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const threshold = accSl.value * 2.55;

        for (let i=0; i<d.length; i+=4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < threshold) {
                d[i+3] = 0; // Transparent
            } else if (isFinal) {
                d[i+3] = 255; // Force solid alpha for output
            }
        }
        tx.putImageData(id, 0, 0);

        const o = document.createElement('canvas'); o.width = W; o.height = H;
        const ox = o.getContext('2d');
        
        // Edge Smoothness FX
        const blur = parseInt(smSl.value);
        if(blur > 0) ox.filter = `blur(${blur}px)`;

        const sW = parseInt(strWSl.value);
        if(sW > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = cStr.value;
            for(let x=-sW; x<=sW; x+=2) for(let y=-sW; y<=sW; y+=2) sx.drawImage(t, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(t, 0, 0);
            
            ox.shadowColor = cGl.value; ox.shadowBlur = 20; ox.drawImage(sx.canvas, 0, 0);
        } else {
            ox.drawImage(t, 0, 0);
        }
        return o;
    }

    function draw() { if(frames.length) { ctx.clearRect(0,0,512,512); ctx.drawImage(process(frames[cur]), 0, 0); } }

    btnExport.onclick = () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ workers: 2, quality: 10, width: 512, height: 512, workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js' });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: 33, copy: true}));
        gif.on('progress', p => pctText.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'accurate_sticker.gif'; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [accSl, smSl, strWSl, shdSl].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + (el.id.includes('sm') || el.id.includes('str') ? 'px' : '%');
        draw();
    });
    [cBg, cStr, cGl].forEach(el => el.oninput = draw);
</script>
</body>
</html>
