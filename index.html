<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Pro - Gallery Effect Fix</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #0a0a0a; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #151515; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #333; }
        .preview-box { width: 100%; aspect-ratio: 1/1; background: #fff; background-image: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%); background-size: 20px 20px; border-radius: 15px; margin-bottom: 15px; display: grid; place-items: center; overflow: hidden; position: relative; }
        canvas { position: absolute; max-width: 100%; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .controls { background: #1a1a1a; padding: 15px; border-radius: 12px; }
        label { font-size: 12px; color: #888; display: block; margin: 10px 0 5px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loader"><h2 id="prog" style="color:var(--primary)">0%</h2><p>Saving Effects to GIF...</p></div>

<div class="card">
    <div class="preview-box">
        <input type="file" id="up" accept="image/gif">
        <canvas id="c"></canvas>
        <p id="msg" style="color:#000">Tap to Load GIF</p>
    </div>

    <div class="controls">
        <label>Object Fit (Padding) <span id="scV">70%</span></label>
        <input type="range" id="scS" min="30" max="90" value="70">

        <label>Stroke Width <span id="wV">15px</span></label>
        <input type="range" id="wS" min="0" max="40" value="15">

        <label>Glow Blur <span id="glV">25px</span></label>
        <input type="range" id="glS" min="0" max="50" value="25">

        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="color" id="stC" value="#ffffff" title="Stroke">
            <input type="color" id="glC" value="#ff00ff" title="Glow">
            <input type="color" id="bgC" value="#ffffff" title="Remove Background Color">
        </div>
    </div>

    <button class="btn" id="dl">DOWNLOAD TO GALLERY</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const scS = document.getElementById('scS'), wS = document.getElementById('wS'), glS = document.getElementById('glS');
    const stC = document.getElementById('stC'), glC = document.getElementById('glC'), bgC = document.getElementById('bgC');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], cur = 0, tid = null, ow, oh;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('msg').style.display = 'none';
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        c.width = 500; c.height = 500;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, 50);
        loader.style.display = 'none';
    };

    function processFrame(img) {
        const s = 500;
        const oc = document.createElement('canvas'); oc.width = s; oc.height = s;
        const ox = oc.getContext('2d');
        
        const scale = scS.value / 100;
        const aspect = ow / oh;
        let dw = aspect > 1 ? s * scale : (s * scale) * aspect;
        let dh = aspect > 1 ? (s * scale) / aspect : s * scale;
        
        const temp = document.createElement('canvas'); temp.width = s; temp.height = s;
        const tx = temp.getContext('2d');
        tx.drawImage(img, (s-dw)/2, (s-dh)/2, dw, dh);

        // BG Removal
        const id = tx.getImageData(0,0,s,s), d = id.data;
        const tr = parseInt(bgC.value.slice(1,3),16), tg = parseInt(bgC.value.slice(3,5),16), tb = parseInt(bgC.value.slice(5,7),16);
        for(let i=0; i<d.length; i+=4) {
            if(Math.hypot(d[i]-tr, d[i+1]-tg, d[i+2]-tb) < 50) d[i+3]=0;
        }
        tx.putImageData(id, 0, 0);

        // Apply Effects to Gallery Download
        ox.shadowColor = glC.value; ox.shadowBlur = glS.value;
        const stroke = parseInt(wS.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width=s; sx.canvas.height=s;
            sx.fillStyle = stC.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) if(x*x+y*y<=stroke*stroke) sx.drawImage(temp, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,s,s);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(temp, 0, 0);
            ox.drawImage(sx.canvas, 0, 0);
        } else {
            ox.drawImage(temp, 0, 0);
        }
        return oc;
    }

    function draw() {
        ctx.clearRect(0,0,500,500);
        ctx.drawImage(processFrame(frames[cur]), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ workers: 2, quality: 10, workerScript: URL.createObjectURL(b), transparent: 'rgba(0,0,0,0)' });
        
        frames.forEach(f => gif.addFrame(processFrame(f), {delay: 50, copy: true, disposal: 2}));
        
        gif.on('progress', p => prog.innerText = Math.round(p*100)+"%");
        gif.on('finished', blob => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "gallery_sticker.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [scS, wS, glS].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('S','V')).innerText = el.value + (el.id==='scS'?'%':'px');
    });
</script>
</body>
</html>
