<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASTER EDITOR PRO MAX</title>

<script src="https://unpkg.com/gifuct-js/dist/gifuct.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: sans-serif;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
}

/* TIMELINE */
.timeline {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  background: #111;
}

.frame {
  width: 60px;
  height: 60px;
  margin: 5px;
  background: #222;
  border-radius: 8px;
}

/* CANVAS */
canvas {
  display: block;
  margin: auto;
  max-width: 95%;
  background: #111;
}

/* CONTROLS */
.controls {
  text-align: center;
  padding: 10px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg,#00eaff,#a855f7);
  color: white;
}
</style>
</head>

<body>

<div class="topbar">
  <span>PRO MAX EDITOR</span>
  <button onclick="exportGIF()">Export</button>
</div>

<input type="file" id="fileInput">

<canvas id="canvas"></canvas>

<div class="timeline" id="timeline"></div>

<div class="controls">
  <button onclick="play()">▶</button>
  <button onclick="pause()">⏸</button>
  <button onclick="process()">BG Remove</button>
</div>

<script>

let frames = [];
let current = 0;
let playing = false;

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

fileInput.onchange = async (e) => {
  let file = e.target.files[0];
  let buffer = await file.arrayBuffer();

  let gif = parseGIF(buffer);
  frames = decompressFrames(gif, true);

  buildTimeline();
  renderFrame(0);
};

function buildTimeline() {
  let t = document.getElementById("timeline");
  t.innerHTML = "";

  frames.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "frame";
    div.onclick = () => {
      current = i;
      renderFrame(i);
    };
    t.appendChild(div);
  });
}

function renderFrame(i) {
  let f = frames[i];

  canvas.width = f.dims.width;
  canvas.height = f.dims.height;

  let imgData = ctx.createImageData(canvas.width, canvas.height);
  imgData.data.set(f.patch);
  ctx.putImageData(imgData, 0, 0);
}

function play() {
  playing = true;
  loop();
}

function pause() {
  playing = false;
}

function loop() {
  if (!playing) return;

  renderFrame(current);
  current = (current + 1) % frames.length;

  requestAnimationFrame(loop);
}

function process() {
  frames.forEach(f => {
    let d = f.patch;
    for (let i=0;i<d.length;i+=4) {
      if (d[i]>200 && d[i+1]>200 && d[i+2]>200) {
        d[i+3]=0;
      }
    }
  });
  renderFrame(current);
}

function exportGIF() {

  let gif = new GIF({
    workers:2,
    quality:10,
    workerScript:"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js",
    transparent:0x00FF00
  });

  frames.forEach(f => {
    let c=document.createElement("canvas");
    c.width=f.dims.width;
    c.height=f.dims.height;
    let cx=c.getContext("2d");

    let img=cx.createImageData(c.width,c.height);
    let d=f.patch;

    for(let i=0;i<d.length;i+=4){
      if(d[i+3]===0){
        d[i]=0; d[i+1]=255; d[i+2]=0; d[i+3]=255;
      }
    }

    img.data.set(d);
    cx.putImageData(img,0,0);

    gif.addFrame(c,{delay:50});
  });

  gif.on('finished',b=>{
    let a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download="pro.gif";
    a.click();
  });

  gif.render();
}

</script>

</body>
</html>
