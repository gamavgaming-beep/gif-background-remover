<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Professional Studio</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .studio-card { background: var(--card); border-radius: 24px; width: 100%; max-width: 500px; padding: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); border: 1px solid #222; box-sizing: border-box; }
        
        /* Perfect Centering Logic */
        .screen { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%), 
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 16px; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid #333; 
            margin-bottom: 15px; 
            display: grid;
            place-items: center; /* This centers everything inside */
        }
        
        #up { 
            position: absolute; 
            inset: 0;
            width: 100%; 
            height: 100%; 
            opacity: 0; 
            cursor: pointer; 
            z-index: 10; 
        }

        #empty { 
            color: #000; 
            font-weight: bold; 
            text-shadow: 0 0 5px rgba(255,255,255,0.8); 
            text-align: center;
            z-index: 1;
            pointer-events: none;
            width: 100%;
        }

        canvas { 
            position: absolute;
            max-width: 100%; 
            max-height: 100%; 
            image-rendering: auto; 
            z-index: 5; 
            pointer-events: none; 
        }
        
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .meta-box { background: #1e1e1e; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .meta-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .meta-val { font-size: 14px; font-weight: bold; color: var(--primary); display: block; margin-top: 4px; }
        
        .control-section { background: #1a1a1a; padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 600; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }
        
        .color-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input[type="color"] { width: 100%; height: 35px; border: none; border-radius: 8px; background: #222; cursor: pointer; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-up { background: #333; color: white; margin-bottom: 10px; border: 1px solid #444; }
        .btn-exp { background: var(--primary); color: #000; }
        
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="prog" style="color:var(--primary)">0%</h1>
    <p id="lMsg" style="color:white">Analyzing & Processing...</p>
</div>

<div class="studio-card">
    <div class="screen">
        <input type="file" id="up" accept="image/gif">
        <div id="empty">Click to Import GIF</div>
        <canvas id="c"></canvas>
    </div>

    <div class="meta-grid">
        <div class="meta-box"><span class="meta-label">Original Size</span><span class="meta-val" id="oS">0 x 0</span></div>
        <div class="meta-box"><span class="meta-label">Original FPS</span><span class="meta-val" id="oF">0 FPS</span></div>
        <div class="meta-box"><span class="meta-label">Target Res</span><span class="meta-val" id="tRes">540 x 540</span></div>
        <div class="meta-box"><span class="meta-label">Export FPS</span><span class="meta-val" id="tF">30 FPS</span></div>
    </div>

    <button class="btn btn-up" onclick="document.getElementById('up').click()">LOAD ASSET</button>

    <div class="control-section">
        <label>Output Resolution <span id="resV">540px</span></label>
        <input type="range" id="resS" min="200" max="800" step="10" value="540">
        
        <label style="margin-top:15px;">Export Frame Rate (FPS) <span id="fpsV">30</span></label>
        <input type="range" id="fpsS" min="5" max="60" step="1" value="30">
    </div>

    <div class="control-section">
        <label>Object Fit (Padding) <span id="scV">85%</span></label>
        <input type="range" id="scS" min="20" max="100" value="85">

        <div class="color-group">
            <div><label>Remove BG</label><input type="color" id="bgC" value="#ffffff"></div>
            <div><label>Stroke Color</label><input type="color" id="stC" value="#000000"></div>
        </div>
        
        <label style="margin-top:15px;">Stroke Width <span id="wV">8px</span></label>
        <input type="range" id="wS" min="0" max="30" value="8">
        
        <label>Alpha Accuracy <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">
    </div>

    <button class="btn btn-exp" id="dl">GENERATE TRANSPARENT STICKER</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const resS = document.getElementById('resS'), fpsS = document.getElementById('fpsS'), scS = document.getElementById('scS'), tS = document.getElementById('tS'), wS = document.getElementById('wS'), bgC = document.getElementById('bgC'), stC = document.getElementById('stC');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');
    
    let frames = [], delays = [], cur = 0, tid = null, ow = 0, oh = 0;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('empty').style.display = 'none';
        loader.style.display = 'flex';
        
        try {
            const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            frames = res.map(f => f.getImage());
            
            ow = frames[0].width; oh = frames[0].height;
            const avgDelay = res.reduce((acc, f) => acc + (f.frameInfo.delay || 10), 0) / res.length;
            const originalFPS = Math.round(100 / avgDelay);
            
            document.getElementById('oS').innerText = `${ow}x${oh}`;
            document.getElementById('oF').innerText = `${originalFPS} FPS`;
            
            updateCanvas();
            startLoop();
        } catch (err) { alert("GIF load error."); }
        loader.style.display = 'none';
    };

    function updateCanvas() {
        const size = parseInt(resS.value);
        c.width = size; c.height = size;
        document.getElementById('tRes').innerText = `${size}x${size}`;
        document.getElementById('resV').innerText = `${size}px`;
        document.getElementById('tF').innerText = `${fpsS.value} FPS`;
        document.getElementById('fpsV').innerText = fpsS.value;
    }

    function startLoop() {
        if(tid) clearInterval(tid);
        const interval = 1000 / parseInt(fpsS.value);
        tid = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, interval);
    }

    function process(img, isExport = false) {
        const size = c.width;
        const tc = document.createElement('canvas');
        tc.width = size; tc.height = size;
        const tx = tc.getContext('2d');
        
        const scale = parseInt(scS.value) / 100;
        const aspect = ow / oh;
        let dw, dh;
        if (aspect > 1) { dw = size * scale; dh = dw / aspect; }
        else { dh = size * scale; dw = dh * aspect; }
        
        tx.clearRect(0, 0, size, size);
        tx.drawImage(img, (size-dw)/2, (size-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,size,size), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = tS.value * 2.55;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = size; sc.height = size;
            const sx = sc.getContext('2d');
            sx.fillStyle = stC.value;
            for(let x = -stroke; x <= stroke; x++) {
                for(let y = -stroke; y <= stroke; y++) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value; sx.fillRect(0,0,size,size);
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw() {
        if(!frames[cur]) return;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(process(frames[cur], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const fps = parseInt(fpsS.value);
        const gif = new GIF({ 
            workers: 4, quality: 5, workerScript: URL.createObjectURL(b), 
            transparent: 'rgba(0,0,0,0)', width: c.width, height: c.height 
        });

        frames.forEach((f) => {
            gif.addFrame(process(f, true), {delay: 1000/fps, copy: true, disposal: 2});
        });

        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `giphy_pro.gif`; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [resS, fpsS, scS, tS, wS, bgC, stC].forEach(el => el.oninput = () => {
        updateCanvas();
        if(el.id === 'fpsS') startLoop();
        document.getElementById(el.id.replace('S','V')).innerText = el.value + (el.id==='wS'?'px':el.id==='scS'?'%':el.id==='tS'?'%':'');
        if(frames.length) draw();
    });
</script>
</body>
</html>
