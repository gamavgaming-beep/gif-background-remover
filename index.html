<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Giphy Sticker Studio | High-End UI</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Level Container */
        .app-container {
            width: 100%;
            max-width: 520px;
            background: var(--surface);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
        }

        /* Premium Preview Screen */
        .preview-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #fff;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 16px 16px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--border);
            margin-bottom: 25px;
            display: grid;
            place-items: center;
            transition: all 0.3s ease;
        }

        #fileInput {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        canvas {
            position: absolute;
            max-width: 95%;
            max-height: 95%;
            z-index: 5;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .upload-hint {
            color: var(--text-dim);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Status Header */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; display: block; }
        .stat-value { font-size: 14px; color: var(--accent); font-weight: 700; }

        /* Control Panels */
        .section-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            margin: 20px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .control-panel {
            background: #fcfcfd;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .input-group { margin-bottom: 18px; }
        .input-group:last-child { margin-bottom: 0; }

        label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        /* Range Sliders Update */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            border: 3px solid #fff;
        }

        /* Resolution Box */
        .res-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .res-box {
            background: #fff;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 14px;
        }

        .res-box input {
            width: 100%;
            border: none;
            font-weight: 800;
            font-size: 16px;
            color: var(--accent);
            outline: none;
            margin-top: 4px;
        }

        /* High Level Color Pickers */
        .color-deck {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .color-card {
            background: #fff;
            border: 1px solid var(--border);
            padding: 15px 10px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .color-card:hover { transform: translateY(-3px); border-color: var(--accent); }

        .picker-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
        }

        input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 70px;
            height: 70px;
            border: none;
            cursor: pointer;
        }

        .color-label { font-size: 9px; font-weight: 800; color: var(--text-dim); margin-top: 10px; text-align: center; }

        /* Master Download Button */
        .btn-generate {
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px var(--accent-glow);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px var(--accent-glow); }
        .btn-generate:active { transform: scale(0.98); }

        /* Loader Overlay */
        #loader {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h1 id="progDisplay" style="color:var(--accent); font-size: 36px; margin: 0;">0%</h1>
    <p style="color:var(--text-dim); font-weight: 600;">Processing Master Graphics...</p>
</div>

<div class="app-container">
    <div class="preview-wrapper">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="mainCanvas"></canvas>
        <div class="upload-hint" id="hint">TAP TO CONFIGURE GIF</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Source Resolution</span>
            <span class="stat-value" id="srcRes">0 x 0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Frame Count</span>
            <span class="stat-value" id="frameCount">0 Frames</span>
        </div>
    </div>

    <div class="section-title">Resolution & Frame Control</div>
    <div class="control-panel">
        <div class="res-container">
            <div class="res-box">
                <span class="stat-label">Width</span>
                <input type="number" id="widthIn" value="512">
            </div>
            <div class="res-box">
                <span class="stat-label">Height</span>
                <input type="number" id="heightIn" value="512">
            </div>
        </div>
        <div class="input-group">
            <label>Frame Delay (Speed) <span id="speedVal">30ms</span></label>
            <input type="range" id="speedSl" min="10" max="250" value="30">
        </div>
    </div>

    <div class="section-title">Accuracy & Visual FX</div>
    <div class="control-panel">
        <div class="input-group">
            <label>Object Fit (Safe Area) <span id="fitVal">70%</span></label>
            <input type="range" id="fitSl" min="20" max="95" value="70">
        </div>
        <div class="input-group">
            <label>Alpha Removal Accuracy <span id="accVal">45%</span></label>
            <input type="range" id="accSl" min="0" max="100" value="45">
        </div>
        <div class="input-group">
            <label>Shadow Depth <span id="shdVal">40%</span></label>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
        <div class="input-group">
            <label>Stroke (Outline) Width <span id="strVal">12px</span></label>
            <input type="range" id="strSl" min="0" max="50" value="12">
        </div>
    </div>

    <div class="color-deck">
        <div class="color-card">
            <div class="picker-circle"><input type="color" id="colorBg" value="#ffffff"></div>
            <span class="color-label">BG REMOVE</span>
        </div>
        <div class="color-card">
            <div class="picker-circle"><input type="color" id="colorStr" value="#ffffff"></div>
            <span class="color-label">OUTLINE</span>
        </div>
        <div class="color-card">
            <div class="picker-circle"><input type="color" id="colorGlow" value="#6366f1"></div>
            <span class="color-label">GLOW</span>
        </div>
    </div>

    <button class="btn-generate" id="btnExport">Generate Sticker</button>
</div>

<script>
    const fileIn = document.getElementById('fileInput'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const wIn = document.getElementById('widthIn'), hIn = document.getElementById('heightIn'), spSl = document.getElementById('speedSl');
    const fitSl = document.getElementById('fitSl'), accSl = document.getElementById('accSl'), strSl = document.getElementById('strSl'), shdSl = document.getElementById('shdSl');
    const cBg = document.getElementById('colorBg'), cStr = document.getElementById('colorStr'), cGl = document.getElementById('colorGlow');
    const exportBtn = document.getElementById('btnExport'), loader = document.getElementById('loader'), prog = document.getElementById('progDisplay');

    let frames = [], currentIdx = 0, timer = null, origW, origH;

    fileIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        origW = frames[0].width; origH = frames[0].height;
        document.getElementById('srcRes').innerText = `${origW} x ${origH}`;
        document.getElementById('frameCount').innerText = `${frames.length} Frames`;
        updateCanvasSize();
        if(timer) clearInterval(timer);
        timer = setInterval(() => { renderLoop(); currentIdx = (currentIdx + 1) % frames.length; }, spSl.value);
        loader.style.display = 'none';
    };

    function updateCanvasSize() { canvas.width = wIn.value; canvas.height = hIn.value; }

    function processLayer(img, isExport = false) {
        const CW = parseInt(wIn.value), CH = parseInt(hIn.value);
        const tempC = document.createElement('canvas'); tempC.width = CW; tempC.height = CH;
        const tx = tempC.getContext('2d');
        const scale = fitSl.value / 100;
        const ratio = origW / origH;
        let dw = (ratio > CW/CH) ? CW*scale : (CH*scale)*ratio;
        let dh = (ratio > CW/CH) ? (CW*scale)/ratio : CH*scale;
        tx.drawImage(img, (CW-dw)/2, (CH-dh)/2, dw, dh);

        // Alpha removal accuracy
        const imgData = tx.getImageData(0,0,CW,CH), data = imgData.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tolerance = accSl.value * 2.55;
        for (let i = 0; i < data.length; i += 4) {
            const diff = Math.sqrt((data[i]-target.r)**2 + (data[i+1]-target.g)**2 + (data[i+2]-target.b)**2);
            if (diff < tolerance) data[i+3] = 0;
            else if (isExport) data[i+3] = 255;
        }
        tx.putImageData(imgData, 0, 0);

        const output = document.createElement('canvas'); output.width = CW; output.height = CH;
        const ox = output.getContext('2d');

        // Shadow Logic
        if(shdSl.value > 0) {
            ox.shadowColor = `rgba(0,0,0,${shdSl.value/120})`;
            ox.shadowBlur = 25; ox.shadowOffsetY = 12;
        }

        const stroke = parseInt(strSl.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = CW; sx.canvas.height = CH;
            sx.fillStyle = cStr.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) if(x*x+y*y <= stroke*stroke) sx.drawImage(tempC, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,CW,CH);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tempC, 0, 0);
            ox.shadowColor = cGl.value; ox.shadowBlur = 30; ox.drawImage(sx.canvas, 0, 0);
        } else {
            ox.drawImage(tempC, 0, 0);
        }
        return output;
    }

    function renderLoop() { if(frames.length) { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(processLayer(frames[currentIdx]), 0, 0); } }

    exportBtn.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ workers: 4, quality: 5, workerScript: URL.createObjectURL(await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob())), transparent: 'rgba(0,0,0,0)', width: canvas.width, height: canvas.height });
        frames.forEach((f, i) => gif.addFrame(processLayer(f, true), {delay: spSl.value, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'high_end_sticker.gif'; a.click(); loader.style.display = 'none'; });
        gif.render();
    };

    [wIn, hIn, spSl, fitSl, accSl, strSl, shdSl, cBg, cStr, cGl].forEach(el => el.oninput = () => {
        const lbl = document.getElementById(el.id.replace('Sl','Val'));
        if(lbl) lbl.innerText = el.value + (el.id==='strSl'?'px':(el.id==='speedSl'?'ms':'%'));
        updateCanvasSize();
        if(el.id==='speedSl' && timer) { clearInterval(timer); timer = setInterval(() => { renderLoop(); currentIdx = (currentIdx + 1) % frames.length; }, spSl.value); }
        renderLoop();
    });
</script>
</body>
</html>
