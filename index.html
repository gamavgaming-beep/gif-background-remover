<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Sticker Maker - Download Fixed</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --blue: #4a90e2; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 15px; }
        h2 { font-size: 14px; color: var(--blue); padding: 15px; margin: 0; text-align: center; border-bottom: 1px solid #eee; }
        .preview-area { width: 100%; height: 320px; position: relative; background: #ccc; background-image: repeating-conic-gradient(#fff 0 90deg, #eee 0 180deg); background-size: 20px 20px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 95%; max-height: 95%; }
        .btn-row { background: var(--blue); display: flex; padding: 10px; gap: 5px; }
        button { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: white; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-weight: bold; }
        .settings { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: white; }
    </style>
</head>
<body>

<div id="loader">
    <div id="prog" style="font-size: 24px;">0%</div>
    <p>Finalizing Your Sticker...</p>
</div>

<div class="card">
    <h2>Sticker Preview</h2>
    <div class="preview-area">
        <canvas id="c1"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    <div class="btn-row">
        <button onclick="document.getElementById('up').click()">Upload GIF</button>
        <button id="dl">Download Fixed GIF</button>
    </div>
</div>

<div class="card settings">
    <div class="grid">
        <div><label>Remove BG</label><input type="color" id="bgC" value="#00ff00"></div>
        <div><label>Stroke Color</label><input type="color" id="stC" value="#000000"></div>
    </div>
    <label>Accuracy: <span id="tV">45%</span></label><input type="range" id="tS" min="0" max="100" value="45">
    <label>Feather: <span id="fV">2</span></label><input type="range" id="fS" min="0" max="30" value="2">
    <label>Edge Shrink: <span id="eV">0px</span></label><input type="range" id="eS" min="0" max="5" value="0">
    <label>Stroke Width: <span id="wV">0px</span></label><input type="range" id="wS" min="0" max="20" value="0">
</div>

<script>
    const up = document.getElementById('up'), c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), tS = document.getElementById('tS'), fS = document.getElementById('fS'), eS = document.getElementById('eS'), wS = document.getElementById('wS'), dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], delays = [], cur = 0, tid = null;

    up.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.delay * 10);
        c1.width = frames[0].width; c1.height = frames[0].height;
        if (tid) clearInterval(tid);
        tid = setInterval(() => { draw(cur); cur = (cur + 1) % frames.length; }, 100);
    };

    function process(img, forDownload = false) {
        const tc = document.createElement('canvas');
        tc.width = c1.width; tc.height = c1.height;
        const tx = tc.getContext('2d');
        tx.drawImage(img, 0, 0);

        const id = tx.getImageData(0,0,tc.width,tc.height), d = id.data;
        const target = hex(bgC.value), tol = tS.value * 2.55, feather = fS.value * 2;
        const shrink = parseInt(eS.value);

        // 1. BG removal
        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (diff < tol + feather) d[i+3] = ((diff - tol) / feather) * 255;
        }
        tx.putImageData(id, 0, 0);

        // 2. Shrink
        if (shrink > 0) {
            tx.globalCompositeOperation = 'destination-out';
            for (let x = -shrink; x <= shrink; x++) {
                for (let y = -shrink; y <= shrink; y++) {
                    if (x !== 0 || y !== 0) tx.drawImage(tc, x, y);
                }
            }
            tx.globalCompositeOperation = 'source-over';
        }

        // 3. Stroke logic
        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = tc.width; sc.height = tc.height;
            const sx = sc.getContext('2d');
            for (let x = -stroke; x <= stroke; x++) {
                for (let y = -stroke; y <= stroke; y++) {
                    if (x*x+y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value;
            sx.fillRect(0,0,sc.width, sc.height);
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw(i) {
        if (!frames[i]) return;
        ctx1.clearRect(0,0,c1.width, c1.height);
        ctx1.drawImage(process(frames[i], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        
        const gif = new GIF({ 
            workers: 4, 
            quality: 1, 
            workerScript: URL.createObjectURL(b), 
            transparent: 'rgba(0,0,0,0)', // Updated transparency handling
            width: c1.width, 
            height: c1.height 
        });

        frames.forEach((f, i) => {
            const pFrame = process(f, true);
            // GIF என்ஜினுக்கு துல்லியமான Transparent லேயரை உணர்த்துகிறோம்
            gif.addFrame(pFrame, {delay: delays[i], copy: true, disposal: 2}); 
        });

        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "sticker_fixed.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hex(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }
    [tS, fS, eS, wS, bgC, stC].forEach(el => {
        el.oninput = () => {
            const display = document.getElementById(el.id.replace('S', 'V'));
            if(display) display.innerText = el.value + (el.id === 'tS' ? '%' : (el.id === 'wS' || el.id === 'eS' ? 'px' : ''));
            if(frames.length) draw(cur);
        }
    });
</script>
</body>
</html>
