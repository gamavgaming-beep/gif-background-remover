<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional GIF Background Remover</title>
    
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    
    <style>
        :root {
            --primary-blue: #4a6da7;
            --bg-gray: #f8f9fb;
            --border-color: #ced4da;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        .main-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* Header Area */
        header {
            text-align: center;
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
        }

        header h1 {
            margin: 0;
            color: var(--primary-blue);
            font-size: 26px;
        }

        header p {
            margin: 5px 0 0;
            color: #777;
            font-size: 14px;
        }

        /* Input and Output Workspace */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border-color);
        }

        .view-box {
            padding: 20px;
            border-right: 1px solid var(--border-color);
            text-align: center;
        }

        .view-box:last-child {
            border-right: none;
        }

        .box-label {
            font-weight: bold;
            color: #555;
            margin-bottom: 12px;
            font-size: 15px;
        }

        /* Alpha Checkerboard Background */
        .preview-container {
            width: 100%;
            height: 350px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eee 75%),
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Button Groups */
        .action-bar {
            padding: 12px;
            background: #f1f3f5;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            background: #5a78af;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #4a6496; }
        button:disabled { background: #adb5bd; cursor: not-allowed; }

        /* Tools Panel */
        .settings-panel {
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .setting-title {
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        input[type="color"] {
            width: 45px;
            height: 35px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .status-info {
            background: #fff9db;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .workspace-grid, .settings-panel { grid-template-columns: 1fr; }
            .view-box { border-right: none; border-bottom: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <h1>GIF Background Remover</h1>
        <p>Online Utility for Transparent GIF Animation</p>
    </header>

    <div class="workspace-grid">
        <div class="view-box">
            <div class="box-label">Input GIF ⓘ</div>
            <div class="preview-container">
                <canvas id="inCanvas"></canvas>
                <div id="dropMsg" style="position:absolute;">Click or Drop GIF here</div>
                <input type="file" id="filePicker" accept="image/gif" style="position:absolute; width:100%; height:100%; opacity:0; cursor:pointer;">
            </div>
            <div class="action-bar">
                <button onclick="document.getElementById('filePicker').click()">Import from file</button>
            </div>
        </div>

        <div class="view-box">
            <div class="box-label">Output GIF (Without Bg)</div>
            <div class="preview-container">
                <canvas id="outCanvas"></canvas>
                <div id="loadingMsg" style="position:absolute;">Waiting for input...</div>
            </div>
            <div class="action-bar">
                <button id="saveBtn" disabled>Save as GIF</button>
            </div>
        </div>
    </div>

    <div class="settings-panel">
        <div class="setting-group">
            <div class="setting-title">Background Color Settings</div>
            <div class="control-row">
                <input type="text" id="colorText" value="white">
                <input type="color" id="colorPicker" value="#ffffff">
            </div>
            
            <div class="setting-title" style="margin-top:15px;">Match Threshold (Tolerance)</div>
            <input type="range" id="threshold" min="0" max="100" value="10">
            <div style="text-align:right; font-size:12px;" id="thresholdVal">10%</div>
        </div>

        <div class="setting-group">
            <div class="setting-title">Preview Options</div>
            <label><input type="radio" name="previewMode" id="animOn" checked> Enable Animation Preview</label>
            <label><input type="radio" name="previewMode" id="animOff"> Disable Animation (Single Frame)</label>
            
            <div class="setting-title" style="margin-top:15px;">Visibility Filters</div>
            <label><input type="checkbox" id="alphaCheck"> Alpha Channel Preview (Binary)</label>
        </div>
    </div>

    <div class="status-info" id="statusMsg">Ready. Please upload a GIF to start.</div>
</div>

<script>
    const filePicker = document.getElementById('filePicker');
    const inCanvas = document.getElementById('inCanvas');
    const outCanvas = document.getElementById('outCanvas');
    const inCtx = inCanvas.getContext('2d');
    const outCtx = outCanvas.getContext('2d');
    
    const colorPicker = document.getElementById('colorPicker');
    const colorText = document.getElementById('colorText');
    const threshold = document.getElementById('threshold');
    const saveBtn = document.getElementById('saveBtn');
    const statusMsg = document.getElementById('statusMsg');

    let gifFrames = [];
    let frameIndex = 0;
    let playTimer = null;

    // File Upload Handler
    filePicker.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        statusMsg.innerText = "Extracting GIF Frames... please wait.";
        document.getElementById('dropMsg').style.display = 'none';
        document.getElementById('loadingMsg').style.display = 'none';

        try {
            const extracted = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            gifFrames = extracted.map(f => f.getImage());
            
            inCanvas.width = outCanvas.width = gifFrames[0].width;
            inCanvas.height = outCanvas.height = gifFrames[0].height;

            statusMsg.innerText = "GIF Loaded. Adjust settings to see live preview.";
            saveBtn.disabled = false;
            startPlayback();
        } catch (err) {
            statusMsg.innerText = "Error: Invalid GIF file.";
        }
    };

    // Live Animation Loop
    function startPlayback() {
        if(playTimer) clearInterval(playTimer);
        playTimer = setInterval(() => {
            if(gifFrames.length === 0) return;
            
            if(document.getElementById('animOn').checked) {
                processAndRender(frameIndex);
                frameIndex = (frameIndex + 1) % gifFrames.length;
            } else {
                processAndRender(0); // Show only first frame if animation off
            }
        }, 100);
    }

    // Core Processing Logic (Chroma Key)
    function processAndRender(idx) {
        const source = gifFrames[idx];
        inCtx.clearRect(0, 0, inCanvas.width, inCanvas.height);
        inCtx.drawImage(source, 0, 0);

        const imgData = inCtx.getImageData(0, 0, inCanvas.width, inCanvas.height);
        const pixels = imgData.data;
        
        const target = hexToRgb(colorPicker.value);
        const limit = threshold.value * 2.55; // convert 0-100 to 0-255 scale
        const isAlphaMode = document.getElementById('alphaCheck').checked;

        for (let i = 0; i < pixels.length; i += 4) {
            const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
            
            // Euclidean distance color matching
            const diff = Math.sqrt(Math.pow(r - target.r, 2) + Math.pow(g - target.g, 2) + Math.pow(b - target.b, 2));

            if(diff < limit) {
                if(isAlphaMode) {
                    pixels[i] = pixels[i+1] = pixels[i+2] = 0; // Black for removed
                    pixels[i+3] = 255;
                } else {
                    pixels[i+3] = 0; // Transparent
                }
            } else if(isAlphaMode) {
                pixels[i] = pixels[i+1] = pixels[i+2] = 255; // White for kept
            }
        }
        outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
        outCtx.putImageData(imgData, 0, 0);
    }

    // Color Picker Sync
    colorPicker.oninput = () => { colorText.value = colorPicker.value; };
    threshold.oninput = () => { document.getElementById('thresholdVal').innerText = threshold.value + "%"; };

    // Final GIF Generation and Download
    saveBtn.onclick = () => {
        statusMsg.innerText = "Encoding High-Quality GIF... (This takes a few moments)";
        saveBtn.disabled = true;

        const gif = new GIF({
            workers: 4,
            quality: 10,
            width: inCanvas.width,
            height: inCanvas.height,
            transparent: 'rgba(0,0,0,0)'
        });

        const target = hexToRgb(colorPicker.value);
        const limit = threshold.value * 2.55;

        gifFrames.forEach((frameCanvas) => {
            const tCanvas = document.createElement('canvas');
            tCanvas.width = inCanvas.width;
            tCanvas.height = inCanvas.height;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(frameCanvas, 0, 0);

            const iData = tCtx.getImageData(0,0, tCanvas.width, tCanvas.height);
            const p = iData.data;

            for (let i = 0; i < p.length; i += 4) {
                const d = Math.sqrt((p[i]-target.r)**2 + (p[i+1]-target.g)**2 + (p[i+2]-target.b)**2);
                if(d < limit) p[i+3] = 0;
            }
            tCtx.putImageData(iData, 0, 0);
            gif.addFrame(tCanvas, {delay: 100, copy: true});
        });

        gif.on('progress', (p) => {
            statusMsg.innerText = `Encoding GIF: ${Math.round(p * 100)}%`;
        });

        gif.on('finished', (blob) => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = "transparent_output.gif";
            link.click();
            statusMsg.innerText = "Success! GIF Downloaded.";
            saveBtn.disabled = false;
        });

        gif.render();
    };

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return {r, g, b};
    }
</script>

</body>
</html>
