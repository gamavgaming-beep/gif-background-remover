<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Sticker Master - High Accuracy</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .studio-card { background: var(--card); border-radius: 20px; width: 100%; max-width: 480px; padding: 15px; border: 1px solid #222; }
        .screen { 
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #333; margin-bottom: 10px; display: grid; place-items: center; 
        }
        #up { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 100%; max-height: 100%; z-index: 5; }
        .control-section { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        label { font-size: 11px; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }
        .color-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        input[type="color"] { width: 100%; height: 30px; border: none; border-radius: 5px; cursor: pointer; background: transparent; }
        .btn-exp { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; background: var(--primary); color: #000; margin-top: 5px; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; }
    </style>
</head>
<body>

<div id="loader">
    <h2 id="prog" style="color:var(--primary)">0%</h2>
    <p>Fixing Giphy Visibility...</p>
</div>

<div class="studio-card">
    <div class="screen">
        <input type="file" id="up" accept="image/gif">
        <canvas id="c"></canvas>
    </div>

    <div class="control-section">
        <label>Object Fit (Safety Zone) <span id="scV">70%</span></label>
        <input type="range" id="scS" min="30" max="90" value="70">
        
        <label style="margin-top:10px;">Alpha Accuracy <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">

        <div class="color-group">
            <div><label>Remove</label><input type="color" id="bgC" value="#ffffff"></div>
            <div><label>Stroke</label><input type="color" id="stC" value="#ffffff"></div>
            <div><label>Glow</label><input type="color" id="glC" value="#ff00ff"></div>
        </div>
    </div>

    <div class="control-section">
        <label>Neon Glow Spread <span id="glV">25px</span></label>
        <input type="range" id="glS" min="0" max="60" value="25">
        
        <label style="margin-top:10px;">Shadow Depth <span id="shV">60%</span></label>
        <input type="range" id="shS" min="0" max="100" value="60">
        
        <label style="margin-top:10px;">Outline Width <span id="wV">15px</span></label>
        <input type="range" id="wS" min="0" max="40" value="15">
    </div>

    <button class="btn-exp" id="dl">FIX & DOWNLOAD FOR GIPHY</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const scS = document.getElementById('scS'), tS = document.getElementById('tS'), wS = document.getElementById('wS'), bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), glC = document.getElementById('glC'), glS = document.getElementById('glS'), shS = document.getElementById('shS');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');
    
    let frames = [], cur = 0, tid = null, ow = 0, oh = 0;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        c.width = 540; c.height = 540;
        startLoop();
        loader.style.display = 'none';
    };

    function startLoop() {
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, 1000/30);
    }

    function process(img, isExport = false) {
        const size = 540;
        const tc = document.createElement('canvas'); tc.width = size; tc.height = size;
        const tx = tc.getContext('2d');
        const scale = parseInt(scS.value) / 100;
        const aspect = ow / oh;
        let dw = aspect > 1 ? size * scale : (size * scale) * aspect;
        let dh = aspect > 1 ? (size * scale) / aspect : size * scale;
        
        tx.drawImage(img, (size-dw)/2, (size-dh)/2, dw, dh);
        const id = tx.getImageData(0,0,size,size), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = parseInt(tS.value) * 2.55;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = size; out.height = size;
        const ox = out.getContext('2d');

        // Giphy Visibility Fix: Layered Shadow & Glow
        if(shS.value > 0) {
            ox.shadowColor = `rgba(0,0,0,${shS.value/100})`;
            ox.shadowBlur = 20; ox.shadowOffsetY = 10;
        }
        if(glS.value > 0) {
            ox.shadowColor = glC.value;
            ox.shadowBlur = parseInt(glS.value);
        }

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d');
            sx.canvas.width = size; sx.canvas.height = size;
            sx.fillStyle = stC.value;
            for(let x = -stroke; x <= stroke; x++) {
                for(let y = -stroke; y <= stroke; y++) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,size,size);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tc, 0, 0);
            ox.drawImage(sx.canvas, 0, 0);
        } else {
            ox.drawImage(tc, 0, 0);
        }
        return out;
    }

    function draw() {
        if(!frames[cur]) return;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(process(frames[cur], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ workers: 4, quality: 3, workerScript: URL.createObjectURL(b), transparent: 'rgba(0,0,0,0)', width: 540, height: 540 });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: 33, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `giphy_fixed.gif`; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [scS, tS, wS, glS, shS, bgC, stC, glC].forEach(el => el.oninput = () => {
        const d = document.getElementById(el.id.replace('S','V'));
        if(d) d.innerText = el.value + (el.id==='shS'||el.id==='scS'||el.id==='tS'?'%':'px');
        if(frames.length) draw();
    });
</script>
</body>
</html>
