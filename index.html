<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed GIF Stroke Sticker</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --blue: #007bff; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 10px; }
        .preview-area { width: 100%; height: 320px; background: #ccc; background-image: repeating-conic-gradient(#fff 0 90deg, #c1c1c1 0 180deg); background-size: 20px 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 95%; max-height: 95%; }
        .btn-row { display: flex; padding: 10px; gap: 8px; background: var(--blue); }
        button { flex: 1; padding: 12px; border: 1px solid white; border-radius: 6px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; }
        .controls { padding: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-top: 10px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader">
    <div id="prog" style="font-size: 32px; font-weight: bold;">0%</div>
    <p>Rendering Sticker with Fixed Stroke...</p>
</div>

<div class="card">
    <div class="preview-area">
        <canvas id="c1"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    <div class="btn-row">
        <button onclick="document.getElementById('up').click()">UPLOAD GIF</button>
        <button id="dl">DOWNLOAD GIF</button>
    </div>
</div>

<div class="card controls">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>Remove BG</label><input type="color" id="bgC" value="#ffffff"></div>
        <div><label>Stroke Color</label><input type="color" id="stC" value="#000000"></div>
    </div>
    <label>Accuracy: <span id="tV">45%</span></label><input type="range" id="tS" min="0" max="100" value="45">
    <label>Feather (Softness): <span id="fV">2</span></label><input type="range" id="fS" min="0" max="30" value="2">
    <label>Stroke Width: <span id="wV">5px</span></label><input type="range" id="wS" min="0" max="20" value="5">
</div>

<script>
    const up = document.getElementById('up'), c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), tS = document.getElementById('tS'), fS = document.getElementById('fS'), wS = document.getElementById('wS');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], delays = [], cur = 0, tid = null;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.delay * 10);
        c1.width = frames[0].width; c1.height = frames[0].height;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(cur); cur = (cur+1)%frames.length; }, 100);
        loader.style.display = 'none';
    };

    function process(img, isExport = false) {
        const tc = document.createElement('canvas');
        tc.width = c1.width; tc.height = c1.height;
        const tx = tc.getContext('2d');
        tx.drawImage(img, 0, 0);

        const id = tx.getImageData(0,0,tc.width,tc.height), d = id.data;
        const target = hex(bgC.value), tol = tS.value * 2.55, feather = fS.value * 2;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (diff < tol + feather) {
                let alpha = ((diff - tol) / feather) * 255;
                // GIF-க்கு ஏற்றவாறு டவுன்லோடில் மட்டும் கடினமான ஓரங்களை (Sharp Edges) உருவாக்குகிறோம்
                d[i+3] = isExport ? (alpha > 128 ? 255 : 0) : alpha;
            } else if (isExport) {
                d[i+3] = 255;
            }
        }
        tx.putImageData(id, 0, 0);

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = tc.width; sc.height = tc.height;
            const sx = sc.getContext('2d');
            
            // ஸ்ட்ரோக் லேயரை முதலில் வரைதல்
            for (let x = -stroke; x <= stroke; x++) {
                for (let y = -stroke; y <= stroke; y++) {
                    if (x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            
            // ஸ்ட்ரோக் நிறத்தை அப்ளை செய்தல்
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value;
            sx.fillRect(0,0,sc.width, sc.height);
            
            // அசல் உருவத்தை மேலே வைத்தல்
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw(i) {
        if(!frames[i]) return;
        ctx1.clearRect(0, 0, c1.width, c1.height);
        ctx1.drawImage(process(frames[i], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ 
            workers: 4, 
            quality: 1, 
            workerScript: URL.createObjectURL(b), 
            transparent: 'rgba(0,0,0,0)',
            width: c1.width, 
            height: c1.height 
        });

        frames.forEach((f, i) => {
            // isExport = true எனில் ஸ்ட்ரோக் சிதையாமல் வரும்
            gif.addFrame(process(f, true), {delay: delays[i], copy: true, disposal: 2});
        });

        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(b); 
            a.download = "fixed_sticker.gif"; 
            a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hex(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }

    [tS, fS, wS, bgC, stC].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('S', 'V')).innerText = el.value + (el.id === 'wS' ? 'px' : (el.id === 'tS' ? '%' : ''));
        if(frames.length) draw(cur);
    });
</script>
</body>
</html>
