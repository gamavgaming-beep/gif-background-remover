<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Giphy Sticker Studio - All Features Merged</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #0a0a0a; --card: #151515; --accent: #ff00ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .studio-card { background: var(--card); border-radius: 20px; width: 100%; max-width: 500px; padding: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Preview Screen */
        .screen { 
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid #333; margin-bottom: 15px; display: grid; place-items: center; 
        }
        #up { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 100%; max-height: 100%; z-index: 5; }

        /* Controls Area */
        .control-section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #282828; }
        h3 { font-size: 14px; margin: 0 0 10px 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        label { font-size: 11px; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; height: 6px; border-radius: 5px; background: #333; appearance: none; }
        
        /* Toggle & Colors */
        .row { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .mode-box { display: flex; align-items: center; gap: 10px; background: #222; padding: 8px 12px; border-radius: 8px; flex: 1; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #444; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .color-item { text-align: center; }
        input[type="color"] { width: 100%; height: 35px; border: none; border-radius: 6px; cursor: pointer; background: #333; padding: 2px; }

        .btn-exp { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; background: var(--primary); color: #000; margin-top: 5px; transition: 0.3s; text-transform: uppercase; }
        .btn-exp:active { transform: scale(0.98); }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #prog { font-size: 40px; margin: 0; }
    </style>
</head>
<body>

<div id="loader">
    <h2 id="prog" style="color:var(--primary)">0%</h2>
    <p>Merging All Pro Features...</p>
</div>

<div class="studio-card">
    <div class="screen">
        <input type="file" id="up" accept="image/gif">
        <canvas id="c"></canvas>
        <div id="hint" style="color:#888; text-align:center; padding:20px;">TAP TO LOAD SOURCE GIF</div>
    </div>

    <div class="control-section">
        <h3>Layout & Removal</h3>
        <label>Object Fit (Safe Area) <span id="scV">70%</span></label>
        <input type="range" id="scS" min="30" max="85" value="70">
        
        <label style="margin-top:10px;">Alpha Accuracy (Tolerance) <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">
    </div>

    <div class="control-section">
        <h3>Sticker Effects</h3>
        <div class="mode-box">
            <span>Animated RGB Glow</span>
            <label class="switch"><input type="checkbox" id="glowToggle"><span class="slider"></span></label>
        </div>

        <div style="margin-top:10px;">
            <label>Outline Width <span id="wV">10px</span></label>
            <input type="range" id="wS" min="0" max="40" value="10">
        </div>

        <div style="margin-top:10px;">
            <label>Shadow Depth <span id="shV">40%</span></label>
            <input type="range" id="shS" min="0" max="100" value="40">
        </div>

        <div class="color-grid">
            <div class="color-item"><label>Remove</label><input type="color" id="bgC" value="#ffffff"></div>
            <div class="color-item"><label>Stroke</label><input type="color" id="stC" value="#ffffff"></div>
            <div class="color-item"><label>Glow</label><input type="color" id="glC" value="#ff00ff"></div>
        </div>
    </div>

    <button class="btn-exp" id="dl">Generate Pro Giphy Sticker</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const scS = document.getElementById('scS'), tS = document.getElementById('tS'), wS = document.getElementById('wS'), shS = document.getElementById('shS');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), glC = document.getElementById('glC'), glowToggle = document.getElementById('glowToggle');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');
    
    let frames = [], cur = 0, tid = null, ow = 0, oh = 0;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        c.width = 540; c.height = 540;
        startLoop();
        loader.style.display = 'none';
    };

    function startLoop() {
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, 1000/20);
    }

    function process(img, frameIdx, isExport = false) {
        const size = 540;
        const mainC = document.createElement('canvas'); mainC.width = size; mainC.height = size;
        const mx = mainC.getContext('2d');
        
        const scale = parseInt(scS.value) / 100;
        const aspect = ow / oh;
        let dw = aspect > 1 ? size * scale : (size * scale) * aspect;
        let dh = aspect > 1 ? (size * scale) / aspect : size * scale;
        
        // Center image
        mx.drawImage(img, (size-dw)/2, (size-dh)/2, dw, dh);

        // Advanced Background Removal (Alpha Accuracy)
        const id = mx.getImageData(0,0,size,size), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = parseInt(tS.value) * 2.55;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255; // Ensure solid pixels for sticker
        }
        mx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = size; out.height = size;
        const ox = out.getContext('2d');

        // Color Mode Logic
        let glowColor = glC.value;
        if(glowToggle.checked) {
            const hue = (frameIdx * 15) % 360;
            glowColor = `hsl(${hue}, 100%, 50%)`;
        }

        // Apply Shadow Depth (From Old Source)
        if(shS.value > 0) {
            ox.shadowColor = `rgba(0,0,0,${shS.value/100})`;
            ox.shadowBlur = 15; ox.shadowOffsetY = 8;
        }

        // Apply Glow
        const finalGlow = document.createElement('canvas'); finalGlow.width = size; finalGlow.height = size;
        const gx = finalGlow.getContext('2d');
        gx.shadowColor = glowColor;
        gx.shadowBlur = 20;

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d');
            sx.canvas.width = size; sx.canvas.height = size;
            sx.fillStyle = glowToggle.checked ? glowColor : stC.value;
            // Precise Stroke Generation
            for(let x = -stroke; x <= stroke; x+=2) {
                for(let y = -stroke; y <= stroke; y+=2) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(mainC, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,size,size);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(mainC, 0, 0);
            gx.drawImage(sx.canvas, 0, 0);
        } else {
            gx.drawImage(mainC, 0, 0);
        }
        
        ox.drawImage(finalGlow, 0, 0);
        return out;
    }

    function draw() {
        if(!frames.length) return;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(process(frames[cur], cur, false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ workers: 4, quality: 5, workerScript: URL.createObjectURL(b), transparent: 'rgba(0,0,0,0)', width: 540, height: 540 });
        frames.forEach((f, i) => gif.addFrame(process(f, i, true), {delay: 50, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `pro_giphy_sticker.gif`; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [scS, tS, wS, shS, bgC, stC, glC].forEach(el => el.oninput = () => {
        const d = document.getElementById(el.id.replace('S','V'));
        if(d) d.innerText = el.value + (['wS','glS'].includes(el.id)?'px':'%');
    });
</script>
</body>
</html>
