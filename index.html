<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Giphy Sticker Studio - Light Theme</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        /* முழுத் திரையும் Light Blue பின்னணியில் இருக்கும் */
        :root { --primary: #00e676; --bg: #e3f2fd; --card: #ffffff; --text: #333; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #bbdefb; }
        
        .preview-area { 
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f0f0 75%), linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid #90caf9; margin-bottom: 15px; display: grid; place-items: center; 
        }
        
        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 100%; max-height: 100%; z-index: 5; }
        
        .status-bar { display: flex; justify-content: space-between; background: #f5f5f5; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; font-weight: bold; color: #1976d2; }

        .panel { background: #fafafa; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
        h3 { font-size: 13px; margin: 0 0 10px 0; color: #1976d2; text-transform: uppercase; }
        
        label { font-size: 11px; color: #666; display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 600; }
        input[type="range"] { width: 100%; accent-color: var(--primary); height: 5px; }

        .flex-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .mode-box { background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd; flex: 1; display: flex; align-items: center; justify-content: space-between; }
        
        /* Shadow Depth Slider Fix */
        .shadow-box { flex: 1.5; } 

        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        input[type="color"] { width: 100%; height: 30px; border: none; border-radius: 5px; cursor: pointer; background: #eee; }

        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loader"><h1 id="prog" style="color:#1976d2">0%</h1><p>Processing Sticker...</p></div>

<div class="container">
    <div class="preview-area">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="c"></canvas>
        <div id="h">CLICK TO LOAD GIF</div>
    </div>

    <div class="status-bar">
        <span>SIZE: <span id="rI">0x0</span></span>
        <span>FRAMES: <span id="fC">0</span></span>
    </div>

    <div class="panel">
        <h3>Frame & Resize</h3>
        <label>Canvas Size <span id="cV">500px</span></label>
        <input type="range" id="cS" min="300" max="800" value="500">
        <label style="margin-top:8px;">Frame Speed <span id="sV">30ms</span></label>
        <input type="range" id="sS" min="10" max="150" value="30">
    </div>

    <div class="panel">
        <h3>Properties</h3>
        <label>Object Fit (Safe Area) <span id="fitV">70%</span></label>
        <input type="range" id="fitS" min="30" max="90" value="70">
        <label style="margin-top:8px;">BG Removal Accuracy <span id="accV">45%</span></label>
        <input type="range" id="accS" min="0" max="100" value="45">
    </div>

    <div class="panel">
        <h3>Visual Effects</h3>
        <div class="flex-row">
            <div class="mode-box">
                <span style="font-size:11px">RGB Glow</span>
                <label class="switch"><input type="checkbox" id="rgb"><span class="slider"></span></label>
            </div>
            <div class="mode-box shadow-box">
                <span style="font-size:11px">Shadow</span>
                <input type="range" id="shS" min="0" max="100" value="40" style="width:70px">
            </div>
        </div>
        <div style="margin-top:12px;">
            <label>Stroke Width <span id="wV">10px</span></label>
            <input type="range" id="wS" min="0" max="30" value="10">
        </div>
        <div class="color-grid">
            <input type="color" id="bgC" value="#ffffff">
            <input type="color" id="stC" value="#ffffff">
            <input type="color" id="glC" value="#ff00ff">
        </div>
    </div>

    <button class="btn-main" id="dl">GENERATE GIPHY STICKER</button>
</div>

<script>
    const up = document.getElementById('fileInput'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const cS = document.getElementById('cS'), sS = document.getElementById('sS'), fitS = document.getElementById('fitS'), accS = document.getElementById('accS');
    const wS = document.getElementById('wS'), shS = document.getElementById('shS'), rgb = document.getElementById('rgb');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), glC = document.getElementById('glC');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], cur = 0, tid = null, ow, oh;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('h').style.display = 'none';
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('rI').innerText = ow+'x'+oh;
        document.getElementById('fC').innerText = frames.length;
        c.width = cS.value; c.height = cS.value;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { render(); cur = (cur+1)%frames.length; }, sS.value);
        loader.style.display = 'none';
    };

    function process(img, idx, isFinal = false) {
        const s = parseInt(cS.value);
        const tc = document.createElement('canvas'); tc.width = s; tc.height = s;
        const tx = tc.getContext('2d');
        const sc = fitS.value / 100;
        const dw = (ow/oh > 1) ? s*sc : (s*sc)*(ow/oh);
        const dh = (ow/oh > 1) ? (s*sc)/(ow/oh) : s*sc;
        tx.drawImage(img, (s-dw)/2, (s-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,s,s), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = accS.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            if (Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2) < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = s; out.height = s;
        const ox = out.getContext('2d');
        let glow = glC.value; if(rgb.checked) glow = `hsl(${(idx*15)%360},100%,50%)`;

        if(shS.value > 0) { ox.shadowColor = `rgba(0,0,0,${shS.value/100})`; ox.shadowBlur = 15; ox.shadowOffsetY = 5; }
        
        const stroke = parseInt(wS.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = s; sx.canvas.height = s;
            sx.fillStyle = rgb.checked ? glow : stC.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) if(x*x+y*y <= stroke*stroke) sx.drawImage(tc, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,s,s);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tc, 0, 0);
            ox.shadowColor = glow; ox.shadowBlur = 15; ox.drawImage(sx.canvas, 0, 0);
        } else { ox.drawImage(tc, 0, 0); }
        return out;
    }

    function render() { if(frames.length) { ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(process(frames[cur], cur), 0, 0); } }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ workers: 2, quality: 10, workerScript: URL.createObjectURL(await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob())), transparent: 'rgba(0,0,0,0)', width: c.width, height: c.height });
        frames.forEach((f, i) => gif.addFrame(process(f, i, true), {delay: sS.value, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pro_sticker.gif'; a.click(); loader.style.display = 'none'; });
        gif.render();
    };

    [cS, sS, fitS, accS, wS, shS, bgC, stC, glC, rgb].forEach(el => el.oninput = () => {
        const v = document.getElementById(el.id.replace('S','V')); if(v) v.innerText = el.value + (el.id==='wS'?'px':(el.id==='sS'?'ms':(el.id==='cS'?'px':'%')));
        if(el.id==='cS') { c.width = cS.value; c.height = cS.value; }
        if(el.id==='sS' && tid) { clearInterval(tid); tid = setInterval(() => { render(); cur = (cur+1)%frames.length; }, sS.value); }
        render();
    });
</script>
</body>
</html>
