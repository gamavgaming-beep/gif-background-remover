<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Background Remover - Pro Tool</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.rawgit.com/jnordberg/gif.js/master/dist/gif.js"></script>
    <style>
        :root { --primary: #5c85d6; --bg-light: #f8f9fb; --border: #ced4da; }
        body { font-family: Arial, sans-serif; background: var(--bg-light); color: #333; margin: 0; padding: 20px; }
        .wrapper { max-width: 1000px; margin: auto; background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        
        /* Header Section */
        header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); }
        h1 { color: #4a6da7; margin: 0; font-size: 24px; }
        
        /* Main Workspace */
        .workspace { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
        .box { padding: 15px; border-right: 1px solid var(--border); text-align: center; }
        .box:last-child { border-right: none; }
        .box-title { font-weight: bold; margin-bottom: 10px; color: #555; display: flex; align-items: center; justify-content: center; }

        /* Checkerboard Background */
        .canvas-area { 
            width: 100%; height: 300px; border: 1px solid #ddd; position: relative;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        canvas { max-width: 100%; max-height: 100%; }

        /* Controls Section */
        .options-panel { padding: 20px; background: #fff; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .tool-section { display: flex; flex-direction: column; gap: 10px; }
        .label-group { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        
        input[type="text"], input[type="color"] { padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        .btn-group { padding: 10px; background: #e9ecef; display: flex; justify-content: space-around; }
        button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; background: #5a78af; color: white; }
        
        #status { text-align: center; padding: 10px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>GIF Background Remover</h1>
        <p>Student Learning Project - Online GIF Maker</p>
    </header>

    <div class="workspace">
        <div class="box">
            <div class="box-title">Input GIF ⓘ</div>
            <div class="canvas-area" id="input-drop">
                <canvas id="input-canvas"></canvas>
                <div id="upload-msg" style="position:absolute;">Click to load an image</div>
                <input type="file" id="file-input" style="opacity:0; position:absolute; width:100%; height:100%; cursor:pointer;">
            </div>
            <div class="btn-group">
                <button onclick="document.getElementById('file-input').click()">Import from file</button>
            </div>
        </div>

        <div class="box">
            <div class="box-title">Output GIF (Without Bg)</div>
            <div class="canvas-area">
                <canvas id="output-canvas"></canvas>
                <div id="loading-msg" style="position:absolute;">Start by loading input</div>
            </div>
            <div class="btn-group">
                <button id="download-btn" disabled>Save as...</button>
            </div>
        </div>
    </div>

    <div class="options-panel">
        <div class="tool-section">
            <div class="label-group">Background Color</div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="color-hex" value="white" style="flex:1;">
                <input type="color" id="color-picker" value="#ffffff">
            </div>
            <div class="label-group" style="margin-top:10px;">Tolerance (%)</div>
            <input type="range" id="tolerance" min="0" max="100" value="10">
            <span id="tol-val">10%</span>
        </div>

        <div class="tool-section">
            <div class="label-group">Preview Animation</div>
            <label><input type="radio" name="anim" id="anim-on" checked> Enable Animation</label>
            <label><input type="radio" name="anim" id="anim-off"> Disable Animation</label>
            
            <div class="label-group" style="margin-top:10px;">Preview Deleted Areas</div>
            <label><input type="checkbox" id="alpha-preview"> Alpha Channel Preview</label>
        </div>
    </div>
    <div id="status">Ready to process.</div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const inCanvas = document.getElementById('input-canvas');
    const outCanvas = document.getElementById('output-canvas');
    const inCtx = inCanvas.getContext('2d');
    const outCtx = outCanvas.getContext('2d');
    const tolInput = document.getElementById('tolerance');
    const colorPicker = document.getElementById('color-picker');
    const downloadBtn = document.getElementById('download-btn');
    const status = document.getElementById('status');

    let frames = [];
    let currentFrame = 0;
    let animLoop = null;

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        document.getElementById('upload-msg').style.display = 'none';
        document.getElementById('loading-msg').style.display = 'none';
        status.innerText = "Extracting frames...";

        frames = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        
        inCanvas.width = outCanvas.width = frames[0].getImage().width;
        inCanvas.height = outCanvas.height = frames[0].getImage().height;

        status.innerText = "Frames loaded. Processing...";
        startAnimation();
        downloadBtn.disabled = false;
    };

    function startAnimation() {
        if(animLoop) clearInterval(animLoop);
        animLoop = setInterval(() => {
            if(frames.length === 0) return;
            if(document.getElementById('anim-on').checked) {
                renderFrame(currentFrame);
                currentFrame = (currentFrame + 1) % frames.length;
            }
        }, 100);
    }

    function renderFrame(index) {
        const frameCanvas = frames[index].getImage();
        inCtx.clearRect(0,0,inCanvas.width, inCanvas.height);
        inCtx.drawImage(frameCanvas, 0, 0);

        const imgData = inCtx.getImageData(0,0,inCanvas.width, inCanvas.height);
        const data = imgData.data;
        const target = hexToRgb(colorPicker.value);
        const tol = tolInput.value * 2.55; // scaling 0-100 to 0-255

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            const dist = Math.sqrt((r-target.r)**2 + (g-target.g)**2 + (b-target.b)**2);

            if(dist < tol) {
                if(document.getElementById('alpha-preview').checked) {
                    data[i] = data[i+1] = data[i+2] = 0; // Black for deleted
                    data[i+3] = 255;
                } else {
                    data[i+3] = 0; // Transparent
                }
            } else if(document.getElementById('alpha-preview').checked) {
                data[i] = data[i+1] = data[i+2] = 255; // White for kept
            }
        }
        outCtx.clearRect(0,0,outCanvas.width, outCanvas.height);
        outCtx.putImageData(imgData, 0, 0);
    }

    tolInput.oninput = () => {
        document.getElementById('tol-val').innerText = tolInput.value + "%";
        if(document.getElementById('anim-off').checked) renderFrame(0);
    };

    function hexToRgb(hex) {
        var r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
        return {r, g, b};
    }

    downloadBtn.onclick = () => {
        status.innerText = "Generating GIF... Please wait.";
        const gif = new GIF({ workers: 2, quality: 10, transparent: 0x000000 });
        // Encoding logic here...
        alert("Encoding started! In a real app, frames are combined here.");
        status.innerText = "Download ready.";
    };
</script>

</body>
</html>
