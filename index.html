<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Pro - Glow Mode Toggle</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .studio-card { background: var(--card); border-radius: 20px; width: 100%; max-width: 480px; padding: 15px; border: 1px solid #222; }
        .screen { 
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #333; margin-bottom: 10px; display: grid; place-items: center; 
        }
        #up { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 100%; max-height: 100%; z-index: 5; }
        .control-section { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        label { font-size: 11px; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }
        .mode-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; background: #222; padding: 10px; border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .btn-exp { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; background: var(--primary); color: #000; margin-top: 5px; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; }
    </style>
</head>
<body>

<div id="loader"><h2 id="prog" style="color:var(--primary)">0%</h2><p>Processing Your Sticker...</p></div>

<div class="studio-card">
    <div class="screen">
        <input type="file" id="up" accept="image/gif">
        <canvas id="c"></canvas>
    </div>

    <div class="control-section">
        <div class="mode-container">
            <span>Animated Glow</span>
            <label class="switch"><input type="checkbox" id="glowToggle"><span class="slider"></span></label>
            <input type="color" id="glC" value="#ff00ff" style="margin-left: auto;">
        </div>

        <label>Object Fit (Safe Area) <span id="scV">70%</span></label>
        <input type="range" id="scS" min="30" max="85" value="70">
        
        <label style="margin-top:10px;">Outline Width <span id="wV">10px</span></label>
        <input type="range" id="wS" min="2" max="25" value="10">
    </div>

    <button class="btn-exp" id="dl">FIX & DOWNLOAD</button>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const scS = document.getElementById('scS'), wS = document.getElementById('wS'), glC = document.getElementById('glC'), glowToggle = document.getElementById('glowToggle');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');
    
    let frames = [], cur = 0, tid = null, ow, oh;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        c.width = 500; c.height = 500;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, 60);
        loader.style.display = 'none';
    };

    function process(img, frameIdx) {
        const s = 500;
        const oc = document.createElement('canvas'); oc.width = s; oc.height = s;
        const ox = oc.getContext('2d');
        
        const scale = scS.value / 100;
        const dw = (ow/oh > 1) ? s * scale : (s * scale) * (ow/oh);
        const dh = (ow/oh > 1) ? (s * scale) / (ow/oh) : s * scale;
        
        const temp = document.createElement('canvas'); temp.width = s; temp.height = s;
        const tx = temp.getContext('2d');
        tx.drawImage(img, (s-dw)/2, (s-dh)/2, dw, dh);

        // Glow Mode Logic
        let currentGlowColor = glC.value;
        if(glowToggle.checked) {
            const hue = (frameIdx * 10) % 360;
            currentGlowColor = `hsl(${hue}, 100%, 50%)`;
        }

        ox.shadowColor = currentGlowColor;
        ox.shadowBlur = 15;

        const stroke = parseInt(wS.value);
        const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = s; sx.canvas.height = s;
        sx.fillStyle = currentGlowColor;
        
        for(let x=-stroke; x<=stroke; x+=2) {
            for(let y=-stroke; y<=stroke; y+=2) {
                if(x*x + y*y <= stroke*stroke) sx.drawImage(temp, x, y);
            }
        }
        sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,s,s);
        sx.globalCompositeOperation = 'source-over'; sx.drawImage(temp, 0, 0);
        
        ox.drawImage(sx.canvas, 0, 0);
        return oc;
    }

    function draw() {
        if(!frames.length) return;
        ctx.clearRect(0,0,500,500);
        ctx.drawImage(process(frames[cur], cur), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ workers: 2, quality: 10, workerScript: URL.createObjectURL(b), transparent: 'rgba(0,0,0,0)' });
        frames.forEach((f, i) => gif.addFrame(process(f, i), {delay: 60, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p*100)+"%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "pro_sticker.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [scS, wS, glC].forEach(el => el.oninput = () => {
        const d = document.getElementById(el.id.replace('S','V'));
        if(d) d.innerText = el.value + (el.id==='scS'?'%':'px');
    });
</script>
</body>
</html>
