<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Maker - Stable Version</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #007bff; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .preview-box { width: 100%; height: 300px; background: #ccc; background-image: repeating-conic-gradient(#fff 0 90deg, #c1c1c1 0 180deg); background-size: 20px 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; border: 2px dashed #999; }
        canvas { max-width: 100%; max-height: 100%; }
        .status-msg { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-up { background: var(--primary); color: white; }
        .btn-dl { background: #28a745; color: white; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        label { font-size: 11px; font-weight: bold; display: block; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="prog">0%</h1>
    <p id="loaderMsg">Reading GIF Frames...</p>
</div>

<div class="container">
    <div class="preview-box">
        <canvas id="c"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
        <div id="tapMsg">Tap to Upload GIF</div>
    </div>
    <div class="status-msg" id="status">Ready to process.</div>

    <button class="btn btn-up" onclick="document.getElementById('up').click()">SELECT GIF</button>
    <button class="btn btn-dl" id="dl">DOWNLOAD STICKER</button>

    <div class="row">
        <div><label>Scale (Size)</label><input type="range" id="scS" min="0.1" max="2.0" step="0.1" value="1.0"></div>
        <div><label>Accuracy</label><input type="range" id="tS" min="0" max="100" value="45"></div>
    </div>
    <div class="row">
        <div><label>BG Color</label><input type="color" id="bgC" value="#ffffff" style="width:100%"></div>
        <div><label>Stroke Color</label><input type="color" id="stC" value="#000000" style="width:100%"></div>
    </div>
    <label style="margin-top:10px;">Stroke Width: <input type="range" id="wS" min="0" max="20" value="5"></label>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const status = document.getElementById('status'), tapMsg = document.getElementById('tapMsg'), loader = document.getElementById('loader');
    const scS = document.getElementById('scS'), tS = document.getElementById('tS'), bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), wS = document.getElementById('wS');

    let frames = [], delays = [], cur = 0, tid = null, ow = 0, oh = 0;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        status.innerText = "Processing " + file.name + "...";
        tapMsg.style.display = 'none';

        try {
            const gifUrl = URL.createObjectURL(file);
            const res = await gifFrames({ url: gifUrl, frames: 'all', outputType: 'canvas' });
            
            frames = res.map(f => f.getImage());
            delays = res.map(f => f.frameInfo.delay * 10);
            
            ow = frames[0].width; oh = frames[0].height;
            updateSize();
            
            if(tid) clearInterval(tid);
            tid = setInterval(() => { draw(cur); cur = (cur+1)%frames.length; }, 100);
            status.innerText = "Loaded successfully!";
        } catch (err) {
            status.innerText = "Error: Could not read this GIF.";
            tapMsg.style.display = 'block';
        }
        loader.style.display = 'none';
    };

    function updateSize() {
        const s = parseFloat(scS.value);
        c.width = ow * s; c.height = oh * s;
    }

    function process(img, isExport = false) {
        const tc = document.createElement('canvas');
        tc.width = c.width; tc.height = c.height;
        const tx = tc.getContext('2d');
        tx.drawImage(img, 0, 0, tc.width, tc.height);

        const id = tx.getImageData(0,0,tc.width,tc.height), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = tS.value * 2.55;

        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = tc.width; sc.height = tc.height;
            const sx = sc.getContext('2d');
            sx.fillStyle = stC.value;
            for(let x = -stroke; x <= stroke; x++) {
                for(let y = -stroke; y <= stroke; y++) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value;
            sx.fillRect(0,0,sc.width, sc.height);
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw(i) {
        if(!frames[i]) return;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(process(frames[i], false), 0, 0);
    }

    document.getElementById('dl').onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ workers: 2, quality: 10, workerScript: URL.createObjectURL(b), transparent: 'rgba(0,0,0,0)', width: c.width, height: c.height });

        frames.forEach((f, i) => gif.addFrame(process(f, true), {delay: delays[i], copy: true, disposal: 2}));
        gif.on('finished', blob => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "sticker.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [scS, tS, bgC, stC, wS].forEach(el => el.oninput = () => { if(el.id === 'scS') updateSize(); if(frames.length) draw(cur); });
</script>
</body>
</html>
