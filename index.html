<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE GIPHY PRO STUDIO</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #6366f1;
            --dark-bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Animated Background */
        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Professional Header */
        .studio-header { text-align: center; margin-bottom: 30px; }
        .studio-header h1 {
            font-size: 32px; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; text-transform: uppercase;
        }
        .studio-header p { font-size: 11px; color: #94a3b8; letter-spacing: 3px; font-weight: 800; margin-top: 5px; }

        .app-shell {
            width: 100%; max-width: 500px;
            background: var(--surface); backdrop-filter: blur(25px);
            border-radius: 32px; padding: 25px; border: 1px solid var(--border);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Alpha Pattern & Centered Viewport */
        .preview-viewport {
            width: 100%; aspect-ratio: 1/1;
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px;
            border-radius: 24px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }

        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        
        /* Fixed Center Hint Text */
        #hint {
            position: absolute; z-index: 2; pointer-events: none;
            color: #64748b; font-weight: 900; font-size: 14px; text-align: center;
            text-transform: uppercase; letter-spacing: 1px;
        }

        canvas { max-width: 96%; max-height: 96%; z-index: 5; }

        /* Meta Data Bar */
        .status-strip {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.4); padding: 12px 20px;
            border-radius: 14px; margin-bottom: 20px;
            font-size: 11px; font-weight: 800; color: var(--primary);
        }

        /* Control UI */
        .control-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        h3 { font-size: 10px; color: var(--primary); text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .res-box { background: rgba(0,0,0,0.25); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .res-box input { background: none; border: none; color: #fff; font-weight: 700; width: 100%; outline: none; }

        label { font-size: 11px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #334155; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--primary); border-radius: 50%; cursor: pointer; border: 4px solid #fff; box-shadow: 0 0 10px var(--primary); }

        /* Pro Color Pickers */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .color-item { display: flex; flex-direction: column; align-items: center; }
        .color-circle { width: 46px; height: 46px; border-radius: 50%; border: 3.5px solid #fff; overflow: hidden; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 75px; height: 75px; cursor: pointer; border: none; }
        .color-item span { font-size: 9px; color: #64748b; font-weight: 800; margin-top: 8px; text-transform: uppercase; }

        /* Unified Export Button */
        .btn-main {
            width: 100%; padding: 22px;
            background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0f172a; border: none; border-radius: 20px;
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.4s; margin-top: 15px;
            box-shadow: 0 15px 30px -10px rgba(0, 255, 136, 0.4);
        }
        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Centered Progress Overlay */
        #loadingLayer {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingLayer">
    <div class="spinner"></div>
    <h1 id="progLabel" style="color:var(--primary); font-size: 50px; margin: 20px 0 0 0;">0%</h1>
    <p style="color:#64748b; font-weight: 800; letter-spacing: 2px;">PROCESSING STICKER...</p>
</div>

<div class="studio-header">
    <h1>GIPHY PRO STUDIO</h1>
    <p>MASTER EDITION V2</p>
</div>

<div class="app-shell">
    <div class="preview-viewport">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="canvas"></canvas>
        <div id="hint">DROP GIF SOURCE<br>OR TAP TO UPLOAD</div>
    </div>

    <div class="status-strip">
        <span>SIZE: <span id="resTxt">0x0</span></span>
        <span>FRAMES: <span id="frameTxt">0</span></span>
    </div>

    <div class="control-panel">
        <h3>Frame & Resize Control</h3>
        <div class="res-grid">
            <div class="res-box"><small>WIDTH</small><input type="number" id="wIn" value="512"></div>
            <div class="res-box"><small>HEIGHT</small><input type="number" id="hIn" value="512"></div>
        </div>
        <label>Frame Speed (Delay) <span id="sVal">30ms</span></label>
        <input type="range" id="sSl" min="10" max="250" value="30">
    </div>

    <div class="control-panel">
        <h3>Accuracy & Visual FX</h3>
        <label>Object Fit (Safe Area) <span id="fitVal">70%</span></label>
        <input type="range" id="fitSl" min="20" max="95" value="70">
        
        <label style="margin-top:15px;">Alpha Accuracy (BG Removal) <span id="accVal">45%</span></label>
        <input type="range" id="accSl" min="0" max="100" value="45">

        <label style="margin-top:15px;">Shadow Depth <span id="shdVal">40%</span></label>
        <input type="range" id="shdSl" min="0" max="100" value="40">

        <label style="margin-top:15px;">Stroke (Outline) Width <span id="strVal">10px</span></label>
        <input type="range" id="strSl" min="0" max="50" value="10">
    </div>

    <div class="color-grid">
        <div class="color-item"><div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div><span>BG CLEAN</span></div>
        <div class="color-item"><div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div><span>STROKE</span></div>
        <div class="color-item"><div class="color-circle"><input type="color" id="cGl" value="#6366f1"></div><span>GLOW</span></div>
    </div>

    <button class="btn-main" id="btnExport">Generate Giphy Sticker</button>
</div>

<script>
    const up = document.getElementById('fileInput'), cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), sSl = document.getElementById('sSl');
    const fitSl = document.getElementById('fitSl'), accSl = document.getElementById('accSl'), shdSl = document.getElementById('shdSl'), strSl = document.getElementById('strSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGl = document.getElementById('cGl');
    const expBtn = document.getElementById('btnExport'), loader = document.getElementById('loadingLayer'), prog = document.getElementById('progLabel');

    let frames = [], cur = 0, timer = null, ow, oh;

    // Load & Parse GIF
    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        loader.style.display = 'flex';
        try {
            const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            frames = res.map(f => f.getImage());
            ow = frames[0].width; oh = frames[0].height;
            document.getElementById('resTxt').innerText = ow+'x'+oh;
            document.getElementById('frameTxt').innerText = frames.length;
            cvs.width = wIn.value; cvs.height = hIn.value;
            if(timer) clearInterval(timer);
            timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, sSl.value);
        } catch (err) { alert("Invalid GIF Source"); }
        loader.style.display = 'none';
    };

    // Frame Processor Engine
    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const tC = document.createElement('canvas'); tC.width = W; tC.height = H;
        const tx = tC.getContext('2d');
        const scale = fitSl.value / 100;
        const ratio = ow / oh;
        let dw = (ratio > W/H) ? W*scale : (H*scale)*ratio;
        let dh = (ratio > W/H) ? (W*scale)/ratio : H*scale;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tol = accSl.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = W; out.height = H;
        const ox = out.getContext('2d');
        
        // Shadow Depth Intensity
        if(shdSl.value > 0) { 
            ox.shadowColor = `rgba(0,0,0,${shdSl.value/130})`; 
            ox.shadowBlur = 18; ox.shadowOffsetY = 10; 
        }

        // Outline / Stroke Logic
        const stroke = parseInt(strSl.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = cStr.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) if(x*x+y*y <= stroke*stroke) sx.drawImage(tC, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tC, 0, 0);
            ox.shadowColor = cGl.value; ox.shadowBlur = 30; ox.drawImage(sx.canvas, 0, 0);
        } else { ox.drawImage(tC, 0, 0); }
        return out;
    }

    function draw() { if(frames.length) { ctx.clearRect(0,0,cvs.width,cvs.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    // Export & Download Logic (Fixed)
    expBtn.onclick = async () => {
        if(!frames.length) return alert("Upload GIF First!");
        loader.style.display = 'flex';
        expBtn.disabled = true;

        const gif = new GIF({
            workers: 2, quality: 5,
            transparent: 'rgba(0,0,0,0)',
            width: parseInt(wIn.value), height: parseInt(hIn.value),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
        });

        frames.forEach(f => gif.addFrame(process(f, true), {delay: sSl.value, copy: true, disposal: 2}));

        gif.on('progress', p => prog.innerText = Math.round(p*100)+'%');
        gif.on('finished', blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `pro_sticker_${Date.now()}.gif`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            loader.style.display = 'none'; expBtn.disabled = false;
        });
        gif.render();
    };

    // Update Listeners
    [wIn, hIn, sSl, fitSl, accSl, shdSl, strSl].forEach(el => el.oninput = () => {
        const lbl = document.getElementById(el.id.replace('Sl','Val'));
        if(lbl) lbl.innerText = el.value + (el.id==='strSl'?'px':(el.id==='sSl'?'ms':'%'));
        cvs.width = wIn.value; cvs.height = hIn.value;
        if(el.id==='sSl' && timer) { clearInterval(timer); timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, sSl.value); }
        draw();
    });
    [cBg, cStr, cGl].forEach(el => el.oninput = draw);
</script>
</body>
</html>
