<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | FINAL FIX</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --accent: #6366f1;
            --surface: rgba(23, 28, 41, 0.98);
        }

        body {
            margin: 0; padding: 15px; font-family: 'Inter', sans-serif;
            background: #0b0f1a; color: #fff; display: flex; flex-direction: column; align-items: center;
        }

        .studio-header h1 {
            font-size: 26px; font-weight: 900; text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 15px 0;
        }

        .app-shell {
            width: 100%; max-width: 450px; background: var(--surface);
            border-radius: 32px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); box-sizing: border-box;
        }

        /* Viewport */
        .viewport {
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; border-radius: 24px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px;
        }

        #hint { position: absolute; color: #888; font-weight: 800; font-size: 14px; text-align: center; pointer-events: none; }
        canvas { max-width: 96%; max-height: 96%; z-index: 5; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        .control-panel { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 10px; }

        /* Resolution & FPS */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select, .num-in { width: 100%; background: #1a202c; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; font-weight: 700; outline: none; box-sizing: border-box; }

        /* Professional Color Pickers */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 5px; }
        .color-box { text-align: center; }
        .color-circle { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 70px; height: 70px; cursor: pointer; border: none; }
        .color-box span { font-size: 9px; color: #64748b; font-weight: 800; display: block; margin-top: 6px; }

        /* Sliders */
        .slider-row { margin-bottom: 15px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 6px; font-weight: 700; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid #fff; cursor: pointer; }

        /* Final Download Button */
        .btn-dl {
            width: 100%; padding: 20px; background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0b0f1a; border: none; border-radius: 20px; font-size: 15px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        /* Progress Screen */
        #loaderUI {
            position: fixed; inset: 0; background: #0b0f1a;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
        }
        #pct { font-size: 90px; font-weight: 900; color: var(--primary); margin: 0; text-shadow: 0 0 30px rgba(0,255,136,0.5); }
    </style>
</head>
<body>

<div id="loaderUI">
    <p id="pct">0%</p>
    <p style="letter-spacing: 4px; font-weight: 800; color: #555; font-size: 12px;">GENERATING STICKER...</p>
</div>

<div class="studio-header"><h1>Giphy Pro Studio</h1></div>

<div class="app-shell">
    <div class="viewport">
        <input type="file" id="gifInput" accept="image/gif">
        <canvas id="cvs"></canvas>
        <div id="hint">TAP TO UPLOAD GIF SOURCE</div>
    </div>

    <div class="control-panel">
        <label>Canvas & Frame Rate</label>
        <div class="row">
            <input type="number" id="wIn" class="num-in" value="512">
            <input type="number" id="hIn" class="num-in" value="512">
        </div>
        <select id="fpsIn">
            <option value="83">12 FPS</option>
            <option value="40">25 FPS</option>
            <option value="33" selected>30 FPS</option>
        </select>
    </div>

    <div class="control-panel">
        <div class="slider-row">
            <div class="slider-head"><span>Fit Area</span><span id="fitVal">70%</span></div>
            <input type="range" id="fitSl" min="30" max="95" value="70">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Alpha Accuracy</span><span id="accVal">45%</span></div>
            <input type="range" id="accSl" min="0" max="100" value="45">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Shadow Depth</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
    </div>

    <div class="color-grid">
        <div class="color-box"><div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div><span>BG CLEAN</span></div>
        <div class="color-box"><div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div><span>STROKE</span></div>
        <div class="color-box"><div class="color-circle"><input type="color" id="cGl" value="#6366f1"></div><span>GLOW</span></div>
    </div>
    <br>
    <button class="btn-dl" id="btnGo">Generate & Download</button>
</div>

<script>
    const gifInput = document.getElementById('gifInput'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), fpsIn = document.getElementById('fpsIn');
    const fitSl = document.getElementById('fitSl'), accSl = document.getElementById('accSl'), shdSl = document.getElementById('shdSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGl = document.getElementById('cGl');
    const btnGo = document.getElementById('btnGo'), loader = document.getElementById('loaderUI'), pctTxt = document.getElementById('pct');

    let frames = [], cur = 0, timer = null, ow, oh;

    // Load GIF
    gifInput.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        cvs.width = wIn.value; cvs.height = hIn.value;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, parseInt(fpsIn.value));
    };

    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const t = document.createElement('canvas'); t.width = W; t.height = H;
        const tx = t.getContext('2d');
        const sc = fitSl.value/100, r = ow/oh;
        let dw = (r > W/H) ? W*sc : (H*sc)*r, dh = (r > W/H) ? (W*sc)/r : H*sc;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tol = accSl.value * 2.55;
        for (let i=0; i<d.length; i+=4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const o = document.createElement('canvas'); o.width = W; o.height = H;
        const ox = o.getContext('2d');
        if(shdSl.value > 0) { ox.shadowColor = 'rgba(0,0,0,0.4)'; ox.shadowBlur = 15; ox.shadowOffsetY = 8; }
        
        // Stroke & Glow Logic
        const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
        sx.fillStyle = cStr.value;
        const s = 10; // Fixed stroke thickness for stability
        for(let x=-s; x<=s; x+=3) for(let y=-s; y<=s; y+=3) sx.drawImage(t, x, y);
        sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
        sx.globalCompositeOperation = 'source-over'; sx.drawImage(t, 0, 0);
        
        ox.shadowColor = cGl.value; ox.shadowBlur = 20; ox.drawImage(sx.canvas, 0, 0);
        return o;
    }

    function draw() { if(frames.length) { ctx.clearRect(0,0,cvs.width,cvs.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    // DOWNLOAD FIX: Use Blob Worker for stability
    btnGo.onclick = () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ 
            workers: 2, quality: 10, width: parseInt(wIn.value), height: parseInt(hIn.value),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
        });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: parseInt(fpsIn.value), copy: true}));
        gif.on('progress', p => pctTxt.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'giphy_pro.gif'; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    [wIn, hIn, fitSl, accSl, shdSl].forEach(el => el.oninput = () => {
        if(el.id.includes('Sl')) document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + '%';
        cvs.width = wIn.value; cvs.height = hIn.value; draw();
    });
    [cBg, cStr, cGl, fpsIn].forEach(el => el.onchange = () => { if(el.id==='fpsIn') { start(); } draw(); });
</script>
</body>
</html>
