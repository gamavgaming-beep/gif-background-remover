<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | FIXED DOWNLOAD</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #6366f1;
            --dark-bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Background Animation */
        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Title */
        .studio-header { text-align: center; margin-bottom: 25px; }
        .studio-header h1 {
            font-size: 32px; font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; text-transform: uppercase;
        }

        .app-shell {
            width: 100%; max-width: 500px;
            background: var(--surface); backdrop-filter: blur(25px);
            border-radius: 32px; padding: 25px; border: 1px solid var(--border);
        }

        /* Preview Viewport & Alpha Pattern */
        .preview-viewport {
            width: 100%; aspect-ratio: 1/1;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            border-radius: 24px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }

        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        
        /* Centered Text */
        #hint {
            position: absolute; z-index: 2; pointer-events: none;
            color: #64748b; font-weight: 800; font-size: 14px; text-align: center;
        }

        canvas { max-width: 95%; max-height: 95%; z-index: 5; }

        .status-strip {
            display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.4); padding: 12px 20px;
            border-radius: 14px; margin-bottom: 20px;
            font-size: 11px; font-weight: 800; color: var(--primary);
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.03); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; border: 1px solid var(--border);
        }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .res-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .res-box input { background: none; border: none; color: #fff; font-weight: 700; width: 100%; outline: none; }

        label { font-size: 11px; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #334155; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer; border: 3px solid #fff; }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .color-circle { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #fff; overflow: hidden; position: relative; margin: 0 auto; }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 70px; height: 70px; cursor: pointer; border: none; }

        /* Download Button Fix */
        .btn-download {
            width: 100%; padding: 20px;
            background: linear-gradient(to right, var(--primary), #00d472);
            color: #0f172a; border: none; border-radius: 20px;
            font-size: 16px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }

        #loader { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="width: 50px; height: 50px; border: 5px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p id="progText" style="margin-top: 20px; font-weight: 800;">Processing: 0%</p>
</div>

<div class="studio-header">
    <h1>Giphy Pro Studio</h1>
</div>

<div class="app-shell">
    <div class="preview-viewport">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="mainCanvas"></canvas>
        <div id="hint">DROP GIF OR<br>TAP TO LOAD</div>
    </div>

    <div class="status-strip">
        <span>SIZE: <span id="resInfo">0x0</span></span>
        <span>FRAMES: <span id="frameInfo">0</span></span>
    </div>

    <div class="control-panel">
        <div class="res-grid">
            <div class="res-box"><small>WIDTH</small><input type="number" id="wIn" value="512"></div>
            <div class="res-box"><small>HEIGHT</small><input type="number" id="hIn" value="512"></div>
        </div>
        <label>Animation Speed <span id="sVal">30ms</span></label>
        <input type="range" id="sSl" min="10" max="250" value="30">
    </div>

    <div class="control-panel">
        <label>Alpha Accuracy <span id="accVal">45%</span></label>
        <input type="range" id="accSl" min="0" max="100" value="45">

        <label style="margin-top:15px;">Shadow Depth <span id="shdVal">40%</span></label>
        <input type="range" id="shdSl" min="0" max="100" value="40">
    </div>

    <div class="color-grid">
        <div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div>
        <div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div>
        <div class="color-circle"><input type="color" id="cGlw" value="#6366f1"></div>
    </div>
    <br>
    <button class="btn-download" id="btnExport">Generate & Download</button>
</div>

<script>
    const fileIn = document.getElementById('fileInput'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), sSl = document.getElementById('sSl');
    const accSl = document.getElementById('accSl'), shdSl = document.getElementById('shdSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGlw = document.getElementById('cGlw');
    const expBtn = document.getElementById('btnExport'), loader = document.getElementById('loader'), prog = document.getElementById('progText');

    let frames = [], cur = 0, timer = null, ow, oh;

    fileIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('resInfo').innerText = ow+'x'+oh;
        document.getElementById('frameInfo').innerText = frames.length;
        canvas.width = wIn.value; canvas.height = hIn.value;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { render(); cur = (cur+1)%frames.length; }, sSl.value);
    };

    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const tC = document.createElement('canvas'); tC.width = W; tC.height = H;
        const tx = tC.getContext('2d');
        const ratio = ow / oh;
        let dw = (ratio > W/H) ? W*0.7 : (H*0.7)*ratio;
        let dh = (ratio > W/H) ? (W*0.7)/ratio : H*0.7;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tol = accSl.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = W; out.height = H;
        const ox = out.getContext('2d');
        
        // Shadow
        if(shdSl.value > 0) { 
            ox.shadowColor = `rgba(0,0,0,${shdSl.value/130})`; ox.shadowBlur = 15; ox.shadowOffsetY = 8; 
        }

        // Stroke
        const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
        sx.fillStyle = cStr.value;
        const str = 10;
        for(let x=-str; x<=str; x+=2) for(let y=-str; y<=str; y+=2) sx.drawImage(tC, x, y);
        sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
        sx.globalCompositeOperation = 'source-over'; sx.drawImage(tC, 0, 0);
        
        ox.shadowColor = cGlw.value; ox.shadowBlur = 25;
        ox.drawImage(sx.canvas, 0, 0);
        return out;
    }

    function render() { if(frames.length) { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    expBtn.onclick = async () => {
        if(!frames.length) return alert("Please upload a GIF first");
        loader.style.display = 'flex';
        expBtn.disabled = true;

        const gif = new GIF({
            workers: 2, quality: 10,
            transparent: 'rgba(0,0,0,0)',
            width: parseInt(wIn.value), height: parseInt(hIn.value),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
        });

        frames.forEach(f => gif.addFrame(process(f, true), {delay: sSl.value, copy: true, disposal: 2}));

        gif.on('progress', p => prog.innerText = `Processing: ${Math.round(p*100)}%`);
        gif.on('finished', blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'pro_sticker.gif';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            loader.style.display = 'none';
            expBtn.disabled = false;
        });
        gif.render();
    };

    [wIn, hIn, sSl, accSl, shdSl].forEach(el => el.oninput = () => {
        const l = document.getElementById(el.id.replace('Sl','Val'));
        if(l) l.innerText = el.value + (el.id==='sSl'?'ms':'%');
        canvas.width = wIn.value; canvas.height = hIn.value;
        render();
    });
</script>
<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
