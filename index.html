<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated GIF BG Remover</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.rawgit.com/jnordberg/gif.js/master/dist/gif.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Alpha Pattern Background */
        .canvas-container {
            margin: 20px auto;
            position: relative;
            display: inline-block;
            border: 3px solid #444;
            background-image: 
                linear-gradient(45deg, #333 25%, transparent 25%), 
                linear-gradient(-45deg, #333 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #333 75%),
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #222; /* Checkered effect colors */
        }

        canvas { max-width: 100%; display: block; }
        
        .controls { background: #3d3d3d; padding: 20px; border-radius: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: center; }
        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="color"] { width: 50px; height: 50px; border: none; cursor: pointer; background: none; }
        button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GIF Chroma Key Remover</h2>
    <p>Upload a GIF, pick a color, and adjust tolerance to see live preview.</p>
    
    <input type="file" id="upload" accept="image/gif">

    <div class="canvas-container">
        <canvas id="preview"></canvas>
    </div>

    <div class="controls">
        <div>
            <label>1. Pick Background Color:</label><br>
            <input type="color" id="bgColor" value="#00ff00">
        </div>
        <div>
            <label>2. Tolerance (<span id="tolValue">50</span>):</label><br>
            <input type="range" id="tolerance" min="0" max="150" value="50">
        </div>
        <button id="processBtn">Download Transparent GIF</button>
    </div>

    <div id="status">Ready. Please upload a GIF.</div>
</div>

<script>
    const upload = document.getElementById('upload');
    const preview = document.getElementById('preview');
    const ctx = preview.getContext('2d');
    const bgColorInput = document.getElementById('bgColor');
    const toleranceInput = document.getElementById('tolerance');
    const tolValue = document.getElementById('tolValue');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let originalFrames = []; // Stores original extracted canvases
    let processedFrames = []; // Stores modified canvases
    let currentFrameIndex = 0;
    let animationId = null;

    toleranceInput.oninput = () => {
        tolValue.innerText = toleranceInput.value;
        applyChromaKeyLive(); // Live update when sliding
    };

    bgColorInput.onchange = () => applyChromaKeyLive();

    upload.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (animationId) cancelAnimationFrame(animationId);
        status.innerText = "Extracting frames... (This may take time for large GIFs)";
        
        try {
            const frames = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
            originalFrames = frames.map(f => f.getImage());
            
            preview.width = originalFrames[0].width;
            preview.height = originalFrames[0].height;
            
            applyChromaKeyLive();
            startAnimationPreview();
            status.innerText = "Animation loaded. Adjust settings above.";
        } catch (err) {
            status.innerText = "Error loading GIF. Try a different file.";
        }
    };

    function applyChromaKeyLive() {
        if (originalFrames.length === 0) return;

        const targetColor = hexToRgb(bgColorInput.value);
        const tolerance = parseInt(toleranceInput.value);

        processedFrames = originalFrames.map(originalCanvas => {
            const canvas = document.createElement('canvas');
            canvas.width = originalCanvas.width;
            canvas.height = originalCanvas.height;
            const fCtx = canvas.getContext('2d');
            fCtx.drawImage(originalCanvas, 0, 0);

            const imgData = fCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const distance = Math.sqrt(
                    Math.pow(r - targetColor.r, 2) +
                    Math.pow(g - targetColor.g, 2) +
                    Math.pow(b - targetColor.b, 2)
                );

                if (distance < tolerance) {
                    data[i + 3] = 0; // Transparent
                }
            }
            fCtx.putImageData(imgData, 0, 0);
            return canvas;
        });
    }

    function startAnimationPreview() {
        function render() {
            if (processedFrames.length > 0) {
                ctx.clearRect(0, 0, preview.width, preview.height);
                ctx.drawImage(processedFrames[currentFrameIndex], 0, 0);
                currentFrameIndex = (currentFrameIndex + 1) % processedFrames.length;
            }
            setTimeout(() => {
                animationId = requestAnimationFrame(render);
            }, 80); // Adjust speed (approx 12fps)
        }
        render();
    }

    processBtn.onclick = () => {
        if (processedFrames.length === 0) return;
        status.innerText = "Encoding high-quality GIF... please wait.";
        processBtn.disabled = true;

        const gif = new GIF({ workers: 4, quality: 10, transparent: 0x000000 });

        processedFrames.forEach(canvas => {
            gif.addFrame(canvas, { delay: 100, copy: true });
        });

        gif.on('finished', (blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "no-bg-animation.gif";
            a.click();
            status.innerText = "Download complete!";
            processBtn.disabled = false;
        });

        gif.render();
    };

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    }
</script>

</body>
</html>
