<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | MASTER UI</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --accent: #6366f1;
            --bg: #0b0f1a;
            --surface: rgba(23, 28, 41, 0.98);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Modern Professional Header */
        .studio-header { text-align: center; margin-bottom: 25px; }
        .studio-header h1 {
            font-size: 28px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin: 0;
        }

        .app-shell {
            width: 100%; max-width: 480px; background: var(--surface);
            backdrop-filter: blur(25px); border-radius: 32px; padding: 24px;
            border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        /* Centered Viewport */
        .viewport {
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: conic-gradient(#e5e7eb 0.25turn, #fff 0.25turn 0.5turn, #e5e7eb 0.5turn 0.75turn, #fff 0.75turn);
            background-size: 20px 20px; border-radius: 24px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 20px;
        }

        #hint { position: absolute; color: #94a3b8; font-weight: 800; font-size: 13px; text-align: center; pointer-events: none; z-index: 1; }
        canvas { max-width: 95%; max-height: 95%; z-index: 5; transition: transform 0.2s; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Control Panels */
        .panel { background: rgba(0,0,0,0.25); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        h3 { font-size: 10px; color: #64748b; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 2px; font-weight: 800; }

        /* Inputs & Select */
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-box { background: #1a202c; padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .input-box small { font-size: 8px; color: #64748b; display: block; margin-bottom: 4px; font-weight: 800; }
        .input-box input, select { background: none; border: none; color: #fff; font-weight: 700; width: 100%; outline: none; font-size: 14px; }
        select { background: #1a202c; padding: 12px; border-radius: 12px; border: 1px solid var(--border); appearance: none; cursor: pointer; }

        /* Sliders */
        .slider-row { margin-bottom: 15px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 8px; font-weight: 700; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #2d3748; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid #fff; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,136,0.3); }

        /* Color Node Strip */
        .color-strip { display: flex; justify-content: space-around; margin-top: 10px; }
        .color-node { text-align: center; }
        .color-circle { width: 42px; height: 42px; border-radius: 50%; border: 3px solid #fff; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 65px; height: 65px; cursor: pointer; border: none; }
        .color-node span { font-size: 9px; color: #64748b; font-weight: 800; display: block; margin-top: 8px; }

        /* Progress Screen */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #pctText { font-size: 85px; font-weight: 900; color: var(--primary); margin: 0; text-shadow: 0 0 40px rgba(0,255,136,0.4); }

        /* Master Download Button */
        .btn-master {
            width: 100%; padding: 20px; background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0b0f1a; border: none; border-radius: 20px; font-size: 15px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.2);
        }
        .btn-master:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="loader">
    <p id="pctText">0%</p>
    <p style="letter-spacing: 4px; font-weight: 800; color: #475569; font-size: 12px;">ENCODING PRO STICKER</p>
</div>

<div class="studio-header"><h1>Giphy Pro Studio</h1></div>

<div class="app-shell">
    <div class="viewport">
        <input type="file" id="gifIn" accept="image/gif">
        <canvas id="cvs"></canvas>
        <div id="hint">TAP TO UPLOAD SOURCE</div>
    </div>

    <div class="panel">
        <h3>Resolution & FPS</h3>
        <div class="res-grid">
            <div class="input-box"><small>WIDTH</small><input type="number" id="wIn" value="512"></div>
            <div class="input-box"><small>HEIGHT</small><input type="number" id="hIn" value="512"></div>
        </div>
        <select id="fpsIn">
            <option value="83">12 FPS (Cinematic)</option>
            <option value="40">25 FPS (Smooth)</option>
            <option value="33" selected>30 FPS (Professional)</option>
        </select>
    </div>

    <div class="panel">
        <h3>Stroke & FX Control</h3>
        <div class="slider-row">
            <div class="slider-head"><span>Stroke Width</span><span id="strWVal">10px</span></div>
            <input type="range" id="strWSl" min="0" max="40" value="10">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Shadow Depth</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
        <div class="slider-row">
            <div class="slider-head"><span>Fit Area</span><span id="fitVal">70%</span></div>
            <input type="range" id="fitSl" min="30" max="95" value="70">
        </div>
    </div>

    <div class="panel">
        <div class="color-strip">
            <div class="color-node"><div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div><span>BG CLEAN</span></div>
            <div class="color-node"><div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div><span>STROKE</span></div>
            <div class="color-node"><div class="color-circle"><input type="color" id="cGl" value="#6366f1"></div><span>GLOW</span></div>
        </div>
    </div>

    <button class="btn-master" id="btnExport">Generate & Download</button>
</div>

<script>
    const gifIn = document.getElementById('gifIn'), cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), fpsIn = document.getElementById('fpsIn');
    const strWSl = document.getElementById('strWSl'), shdSl = document.getElementById('shdSl'), fitSl = document.getElementById('fitSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGl = document.getElementById('cGl');
    const btnExport = document.getElementById('btnExport'), loader = document.getElementById('loader'), pctText = document.getElementById('pctText');

    let frames = [], cur = 0, timer = null, ow, oh;

    gifIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        cvs.width = wIn.value; cvs.height = hIn.value;
        start();
    };

    function start() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => { draw(); cur = (cur+1)%frames.length; }, parseInt(fpsIn.value));
    }

    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const t = document.createElement('canvas'); t.width = W; t.height = H;
        const tx = t.getContext('2d');
        const sc = fitSl.value/100, r = ow/oh;
        let dw = (r > W/H) ? W*sc : (H*sc)*r, dh = (r > W/H) ? (W*sc)/r : H*sc;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        // BG Removal
        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        for (let i=0; i<d.length; i+=4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < 50) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const o = document.createElement('canvas'); o.width = W; o.height = H;
        const ox = o.getContext('2d');
        
        // Shadow
        if(shdSl.value > 0) {
            ox.shadowColor = 'rgba(0,0,0,0.4)';
            ox.shadowBlur = 15;
            ox.shadowOffsetY = (shdSl.value/10);
        }
        
        // Stroke Logic [New Professional Implementation]
        const sW = parseInt(strWSl.value);
        if(sW > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = cStr.value;
            // Multiple layers for smooth stroke
            for(let x=-sW; x<=sW; x+=2) {
                for(let y=-sW; y<=sW; y+=2) {
                    if(x*x + y*y <= sW*sW) sx.drawImage(t, x, y);
                }
            }
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(t, 0, 0);
            
            // Glow
            ox.shadowColor = cGl.value;
            ox.shadowBlur = 20;
            ox.drawImage(sx.canvas, 0, 0);
        } else {
            ox.drawImage(t, 0, 0);
        }
        return o;
    }

    function draw() { if(frames.length) { ctx.clearRect(0,0,cvs.width,cvs.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    // DOWNLOAD ENGINE FIX
    btnExport.onclick = () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ 
            workers: 2, quality: 15, width: parseInt(wIn.width), height: parseInt(hIn.height),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
        });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: parseInt(fpsIn.value), copy: true, disposal: 2}));
        gif.on('progress', p => pctText.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `pro_sticker_${Date.now()}.gif`; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    // Listeners
    [wIn, hIn, strWSl, shdSl, fitSl].forEach(el => el.oninput = () => {
        if(el.id.includes('Sl')) document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + (el.id.includes('str')?'px':'%');
        cvs.width = wIn.value; cvs.height = hIn.value; draw();
    });
    [cBg, cStr, cGl, fpsIn].forEach(el => el.onchange = () => { if(el.id==='fpsIn') start(); draw(); });
</script>
</body>
</html>
