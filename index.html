<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Giphy Frame Editor MAX</title><script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script><script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script><style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;margin:0;padding:10px}
.container{max-width:520px;margin:auto}
.preview{width:100%;aspect-ratio:1/1;border-radius:15px;background:#fff;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:20px 20px;display:grid;place-items:center}
canvas{max-width:95%;max-height:95%}
.controls{display:flex;gap:8px;margin-top:10px}
button,input,select{flex:1;padding:10px;border:none;border-radius:10px;font-weight:bold}
.btn-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.btn-wrap span{font-size:11px;color:#94a3b8}
.timeline{display:flex;overflow-x:auto;gap:6px;margin-top:10px}
.frame{width:60px;height:60px;border:2px solid #333;border-radius:8px}
.active{border-color:#00ff88}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.slider{width:100%}
.center{text-align:center;margin-top:5px;color:#00ff88;font-weight:bold}
</style></head>
<body><div class="container"><div class="preview">
<canvas id="canvas" width="512" height="512"></canvas>
</div><!-- FRAME NAVIGATION --><div class="controls">
<div class="btn-wrap"><button id="prev">⏮</button><span>Prev Frame</span></div>
<div class="btn-wrap"><button id="next">⏭</button><span>Next Frame</span></div>
</div><div class="center" id="frameLabel">Frame 0 / 0</div><input type="range" id="seek" class="slider" min="0" max="0" value="0"><!-- PLAY CONTROLS --><div class="controls">
<div class="btn-wrap"><button id="play">▶️</button><span>Play Frames</span></div>
<div class="btn-wrap"><button id="pause">⏸</button><span>Pause</span></div>
<div class="btn-wrap"><button id="delete">🗑</button><span>Delete</span></div>
</div><input type="file" id="fileInput" accept="image/gif"><div class="timeline" id="timeline"></div><button id="export" style="margin-top:15px;background:#00ff88;color:#000">EXPORT</button>

</div><script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const timeline=document.getElementById('timeline');
const seek=document.getElementById('seek');
const label=document.getElementById('frameLabel');

let frames=[],current=0,timer=null;

function updateUI(){
 label.innerText=`Frame ${current+1} / ${frames.length}`;
 seek.max=frames.length-1;
 seek.value=current;
}

function render(){
 if(!frames.length)return;
 ctx.clearRect(0,0,512,512);
 ctx.drawImage(frames[current],0,0,512,512);
 updateUI();
}

function build(){
 timeline.innerHTML="";
 frames.forEach((f,i)=>{
  const c=document.createElement('canvas');
  c.width=60;c.height=60;
  c.className='frame'+(i===current?' active':'');
  c.getContext('2d').drawImage(f,0,0,60,60);
  c.onclick=()=>{current=i;render();build()};
  timeline.appendChild(c);
 });
}

fileInput.onchange=async e=>{
 const res=await gifFrames({url:URL.createObjectURL(e.target.files[0]),frames:'all',outputType:'canvas'});
 frames=res.map(f=>f.getImage());
 current=0;
 render();build();
}

prev.onclick=()=>{if(frames.length){current=(current-1+frames.length)%frames.length;render();build();}}
next.onclick=()=>{if(frames.length){current=(current+1)%frames.length;render();build();}}

seek.oninput=()=>{current=parseInt(seek.value);render();build();}

play.onclick=()=>{
 clearInterval(timer);
 timer=setInterval(()=>{current=(current+1)%frames.length;render();build();},1000/24);
}

pause.onclick=()=>clearInterval(timer);

delete.onclick=()=>{
 if(frames.length>1){frames.splice(current,1);current=0;render();build();}
}

export.onclick=()=>{
 const gif=new GIF({workers:2,quality:10,width:512,height:512});
 frames.forEach(f=>gif.addFrame(f,{delay:1000/24,copy:true}));
 gif.on('finished',b=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='pro_max.gif';
  a.click();
 });
 gif.render();
}
</script></body>
</html>
