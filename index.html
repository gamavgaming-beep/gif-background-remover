<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giphy Pro Studio | A to Z Ultimate</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.4);
            --bg: #0b0f1a;
            --surface: #171c29;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg); color: var(--text-main);
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 520px; background: var(--surface); border-radius: 32px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }

        /* [User Requested] Alpha Backboard Preview */
        .preview-wrapper {
            width: 100%; aspect-ratio: 1/1; border-radius: 24px; position: relative; overflow: hidden;
            border: 3px solid var(--accent); margin-bottom: 25px; display: grid; place-items: center;
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 95%; max-height: 95%; z-index: 5; }
        .upload-hint { color: #475569; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; pointer-events: none; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; display: block; }
        .stat-value { font-size: 14px; color: var(--accent); font-weight: 700; }

        /* Controls */
        .section-title { font-size: 12px; font-weight: 800; color: var(--accent); margin: 20px 0 10px 0; text-transform: uppercase; letter-spacing: 1.5px; }
        .control-panel { background: rgba(0,0,0,0.15); border-radius: 20px; padding: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        
        .res-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .res-box { background: #1a202c; border: 1px solid var(--border); padding: 10px; border-radius: 14px; }
        .res-box input { background: none; border: none; color: #fff; font-weight: 800; width: 100%; outline: none; }

        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 8px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #2d3748; border-radius: 10px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px var(--accent-glow); }

        /* Color Deck */
        .color-deck { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .color-card { background: #1a202c; border: 1px solid var(--border); padding: 12px 5px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; }
        .picker-circle { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 3px solid #fff; position: relative; }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 60px; height: 60px; cursor: pointer; }
        .color-label { font-size: 8px; font-weight: 800; color: var(--text-dim); margin-top: 8px; }

        /* Master Download UI */
        #loader {
            position: fixed; inset: 0; background: var(--bg); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #progDisplay { font-size: 100px; font-weight: 900; color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); margin: 0; }
        .load-status { letter-spacing: 4px; color: #fff; font-weight: 800; font-size: 12px; margin-top: 15px; }

        .btn-generate {
            width: 100%; padding: 20px; background: var(--accent); color: #0b0f1a; border: none;
            border-radius: 20px; font-size: 16px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px var(--accent-glow);
        }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="progDisplay">0%</h1>
    <p class="load-status">RENDERING PRO STICKER</p>
</div>

<div class="app-container">
    <div class="preview-wrapper">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="mainCanvas"></canvas>
        <div class="upload-hint" id="hint">TAP TO LOAD GIF</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label">Source</span><span class="stat-value" id="srcRes">0 x 0</span></div>
        <div class="stat-card"><span class="stat-label">Frames</span><span class="stat-value" id="frameCount">0</span></div>
    </div>

    <div class="section-title">Resolution & Speed</div>
    <div class="control-panel">
        <div class="res-container">
            <div class="res-box"><span class="stat-label">Width</span><input type="number" id="widthIn" value="512"></div>
            <div class="res-box"><span class="stat-label">Height</span><input type="number" id="heightIn" value="512"></div>
        </div>
        <div class="input-group">
            <label>Frame Delay (FPS Control) <span id="speedVal">33ms</span></label>
            <input type="range" id="speedSl" min="10" max="200" value="33">
        </div>
    </div>

    <div class="section-title">Accuracy & Style FX</div>
    <div class="control-panel">
        <div class="input-group">
            <label>Removal Accuracy <span id="accVal">45%</span></label>
            <input type="range" id="accSl" min="0" max="100" value="45">
        </div>
        <div class="input-group">
            <label>Object Fit (Safe Area) <span id="fitVal">75%</span></label>
            <input type="range" id="fitSl" min="20" max="100" value="75">
        </div>
        <div class="input-group">
            <label>Stroke Width <span id="strVal">12px</span></label>
            <input type="range" id="strSl" min="0" max="60" value="12">
        </div>
        <div class="input-group">
            <label>Shadow Depth <span id="shdVal">40%</span></label>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
    </div>

    <div class="color-deck">
        <div class="color-card"><div class="picker-circle"><input type="color" id="colorBg" value="#ffffff"></div><span class="color-label">BG CLEAN</span></div>
        <div class="color-card"><div class="picker-circle"><input type="color" id="colorStr" value="#ffffff"></div><span class="color-label">STROKE</span></div>
        <div class="color-card"><div class="picker-circle"><input type="color" id="colorGlow" value="#6366f1"></div><span class="color-label">GLOW FX</span></div>
    </div>

    <button class="btn-generate" id="btnExport">Generate Sticker</button>
</div>

<script>
    const fileIn = document.getElementById('fileInput'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const wIn = document.getElementById('widthIn'), hIn = document.getElementById('heightIn'), spSl = document.getElementById('speedSl');
    const fitSl = document.getElementById('fitSl'), accSl = document.getElementById('accSl'), strSl = document.getElementById('strSl'), shdSl = document.getElementById('shdSl');
    const cBg = document.getElementById('colorBg'), cStr = document.getElementById('colorStr'), cGl = document.getElementById('colorGlow');
    const exportBtn = document.getElementById('btnExport'), loader = document.getElementById('loader'), prog = document.getElementById('progDisplay');

    let frames = [], currentIdx = 0, timer = null, origW, origH;

    fileIn.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        origW = frames[0].width; origH = frames[0].height;
        document.getElementById('srcRes').innerText = `${origW}x${origH}`;
        document.getElementById('frameCount').innerText = frames.length;
        updateCanvasSize();
        if(timer) clearInterval(timer);
        timer = setInterval(() => { renderLoop(); currentIdx = (currentIdx + 1) % frames.length; }, spSl.value);
    };

    function updateCanvasSize() { canvas.width = wIn.value; canvas.height = hIn.value; }

    function processLayer(img, isExport = false) {
        const CW = parseInt(wIn.value), CH = parseInt(hIn.value);
        const tempC = document.createElement('canvas'); tempC.width = CW; tempC.height = CH;
        const tx = tempC.getContext('2d');
        const scale = fitSl.value / 100, ratio = origW / origH;
        let dw = (ratio > CW/CH) ? CW*scale : (CH*scale)*ratio;
        let dh = (ratio > CW/CH) ? (CW*scale)/ratio : CH*scale;
        tx.drawImage(img, (CW-dw)/2, (CH-dh)/2, dw, dh);

        const imgData = tx.getImageData(0,0,CW,CH), data = imgData.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tolerance = accSl.value * 2.55;

        for (let i = 0; i < data.length; i += 4) {
            const diff = Math.sqrt((data[i]-target.r)**2 + (data[i+1]-target.g)**2 + (data[i+2]-target.b)**2);
            if (diff < tolerance) data[i+3] = 0;
            else if (isExport) data[i+3] = 255;
        }
        tx.putImageData(imgData, 0, 0);

        const output = document.createElement('canvas'); output.width = CW; output.height = CH;
        const ox = output.getContext('2d');

        if(shdSl.value > 0) { ox.shadowColor = 'rgba(0,0,0,0.5)'; ox.shadowBlur = 15; ox.shadowOffsetY = 10; }

        const stroke = parseInt(strSl.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = CW; sx.canvas.height = CH;
            sx.fillStyle = cStr.value;
            for(let x=-stroke; x<=stroke; x+=3) for(let y=-stroke; y<=stroke; y+=3) if(x*x+y*y <= stroke*stroke) sx.drawImage(tempC, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,CW,CH);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tempC, 0, 0);
            ox.shadowColor = cGl.value; ox.shadowBlur = 30; ox.drawImage(sx.canvas, 0, 0);
        } else { ox.drawImage(tempC, 0, 0); }
        return output;
    }

    function renderLoop() { if(frames.length) { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(processLayer(frames[currentIdx]), 0, 0); } }

    /* [CRITICAL FIX] Worker Script Handling for Stable Download */
    exportBtn.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        
        try {
            const response = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
            const blob = await response.blob();
            const workerUrl = URL.createObjectURL(blob);

            const gif = new GIF({ 
                workers: 2, quality: 10, 
                width: canvas.width, height: canvas.height, 
                workerScript: workerUrl,
                transparent: 'rgba(0,0,0,0)' 
            });

            frames.forEach(f => gif.addFrame(processLayer(f, true), {delay: spSl.value, copy: true, disposal: 2}));
            
            gif.on('progress', p => prog.innerText = Math.round(p*100)+'%');
            gif.on('finished', b => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `pro_sticker_${Date.now()}.gif`; a.click();
                loader.style.display = 'none';
                URL.revokeObjectURL(workerUrl);
            });
            gif.render();
        } catch (err) {
            alert("Download Error. Check Internet.");
            loader.style.display = 'none';
        }
    };

    [wIn, hIn, spSl, fitSl, accSl, strSl, shdSl, cBg, cStr, cGl].forEach(el => el.oninput = () => {
        const lbl = document.getElementById(el.id.replace('Sl','Val'));
        if(lbl) lbl.innerText = el.value + (el.id==='strSl'?'px':(el.id==='speedSl'?'ms':'%'));
        updateCanvasSize();
        if(el.id==='speedSl' && timer) { clearInterval(timer); timer = setInterval(() => { renderLoop(); currentIdx = (currentIdx + 1) % frames.length; }, spSl.value); }
        renderLoop();
    });
</script>
</body>
</html>
