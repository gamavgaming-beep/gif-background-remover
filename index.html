<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | MASTER ENGINE</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #6366f1;
            --dark-bg: #0b0f1a;
            --surface: rgba(23, 28, 41, 0.98);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Animated Background */
        body {
            margin: 0; padding: 20px; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Header Style */
        .studio-header { text-align: center; margin-bottom: 25px; }
        .studio-header h1 {
            font-size: 32px; font-weight: 900; margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .app-shell {
            width: 100%; max-width: 500px; background: var(--surface);
            backdrop-filter: blur(25px); border-radius: 32px; padding: 28px;
            border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.6);
        }

        /* Viewport & Alpha Pattern */
        .preview-viewport {
            width: 100%; aspect-ratio: 1/1; background-color: #ffffff;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px; border-radius: 28px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }

        /* Fixed Centered Hint */
        #hint { 
            position: absolute; color: #64748b; font-weight: 900; text-align: center; 
            font-size: 15px; z-index: 2; pointer-events: none; line-height: 1.4;
        }

        canvas { max-width: 95%; max-height: 95%; z-index: 5; border-radius: 8px; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Status Strip */
        .status-strip {
            display: flex; justify-content: space-between; background: rgba(0,0,0,0.4);
            padding: 14px 22px; border-radius: 16px; margin-bottom: 20px;
            font-size: 12px; font-weight: 800; color: var(--primary); border: 1px solid var(--border);
        }

        /* Control Panels */
        .control-panel {
            background: rgba(255,255,255,0.03); border-radius: 24px;
            padding: 22px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin: 0 0 18px 0; letter-spacing: 2px; font-weight: 800; }

        /* Resolution Inputs */
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .res-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 14px; border: 1px solid var(--border); }
        .res-box small { font-size: 9px; color: #64748b; display: block; margin-bottom: 5px; font-weight: 800; }
        .res-box input { background: none; border: none; color: #fff; font-weight: 800; width: 100%; outline: none; font-size: 16px; }

        /* FPS Toggle */
        .fps-group { margin-bottom: 20px; }
        select {
            width: 100%; background: #1a202c; color: #fff; border: 1px solid var(--border);
            padding: 15px; border-radius: 14px; font-weight: 800; outline: none; cursor: pointer; appearance: none;
        }

        /* Sliders */
        .slider-row { margin-bottom: 18px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 10px; font-weight: 700; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; background: #2d3748; border-radius: 10px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--primary); border-radius: 50%; border: 4px solid #fff; cursor: pointer; box-shadow: 0 0 15px var(--primary); }

        /* Advanced Color Pickers */
        .color-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .color-item { text-align: center; }
        .color-circle { width: 50px; height: 50px; border-radius: 50%; border: 4px solid #fff; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        input[type="color"] { position: absolute; top: -15px; left: -15px; width: 80px; height: 80px; cursor: pointer; }
        .color-item span { font-size: 10px; color: #64748b; font-weight: 800; display: block; margin-top: 8px; text-transform: uppercase; }

        /* Progress Screen */
        #loadingLayer {
            position: fixed; inset: 0; background: rgba(11, 15, 26, 0.99);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        #percentNum { font-size: 100px; font-weight: 900; color: var(--primary); margin: 0; text-shadow: 0 0 30px var(--primary); }
        .loader-text { color: #64748b; font-weight: 900; letter-spacing: 4px; margin-top: 10px; font-size: 12px; text-transform: uppercase; }

        .btn-export {
            width: 100%; padding: 22px; background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0b0f1a; border: none; border-radius: 22px; font-size: 16px;
            font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.4s;
            box-shadow: 0 20px 40px -10px rgba(0, 255, 136, 0.4);
        }
        .btn-export:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div id="loadingLayer">
    <p id="percentNum">0%</p>
    <p class="loader-text">Generating Pro Sticker</p>
</div>

<div class="studio-header">
    <h1>Giphy Pro Studio</h1>
</div>

<div class="app-shell">
    <div class="preview-viewport">
        <input type="file" id="gifInput" accept="image/gif">
        <canvas id="mainCanvas"></canvas>
        <div id="hint">DROP GIF OR<br>TAP TO LOAD SOURCE</div>
    </div>

    <div class="status-strip">
        <span>RESOLUTION: <span id="metaRes">0x0</span></span>
        <span>FRAMES: <span id="metaFrames">0</span></span>
    </div>

    <div class="control-panel">
        <h3>Master Configuration</h3>
        <div class="res-grid">
            <div class="res-box"><small>CANVAS WIDTH</small><input type="number" id="wIn" value="512"></div>
            <div class="res-box"><small>CANVAS HEIGHT</small><input type="number" id="hIn" value="512"></div>
        </div>
        <div class="fps-group">
            <select id="fpsToggle">
                <option value="83">12 fps</option>
                <option value="66">15 fps</option>
                <option value="55">18 fps</option>
                <option value="50">20 fps</option>
                <option value="41">24 fps</option>
                <option value="40">25 fps</option>
                <option value="33" selected>30 fps</option>
            </select>
        </div>
    </div>

    <div class="control-panel">
        <h3>Visual Property</h3>
        <div class="slider-row">
            <div class="slider-header"><span>Object Fit (Safe Area)</span><span id="fitVal">70%</span></div>
            <input type="range" id="fitSl" min="20" max="95" value="70">
        </div>
        <div class="slider-row">
            <div class="slider-header"><span>BG Removal Accuracy</span><span id="accVal">45%</span></div>
            <input type="range" id="accSl" min="0" max="100" value="45">
        </div>
        <div class="slider-row">
            <div class="slider-header"><span>Shadow Depth</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
        <div class="slider-row">
            <div class="slider-header"><span>Stroke (Outline)</span><span id="strVal">10px</span></div>
            <input type="range" id="strSl" min="0" max="40" value="10">
        </div>
    </div>

    <div class="color-row">
        <div class="color-item"><div class="color-circle"><input type="color" id="cBg" value="#ffffff"></div><span>BG CLEAN</span></div>
        <div class="color-item"><div class="color-circle"><input type="color" id="cStr" value="#ffffff"></div><span>STROKE</span></div>
        <div class="color-item"><div class="color-circle"><input type="color" id="cGl" value="#6366f1"></div><span>GLOW</span></div>
    </div>
    <br>
    <button class="btn-export" id="btnExport">Generate & Download Sticker</button>
</div>

<script>
    const input = document.getElementById('gifInput'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), fpsTog = document.getElementById('fpsToggle');
    const fitSl = document.getElementById('fitSl'), accSl = document.getElementById('accSl'), shdSl = document.getElementById('shdSl'), strSl = document.getElementById('strSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGl = document.getElementById('cGl');
    const exportBtn = document.getElementById('btnExport'), loader = document.getElementById('loadingLayer'), pNum = document.getElementById('percentNum');

    let frames = [], cur = 0, playback = null, ow, oh;

    // Load Source
    input.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('metaRes').innerText = ow+'x'+oh;
        document.getElementById('metaFrames').innerText = frames.length;
        canvas.width = wIn.value; canvas.height = hIn.value;
        startPlayback();
    };

    function startPlayback() {
        if(playback) clearInterval(playback);
        playback = setInterval(() => { renderFrame(); cur = (cur+1)%frames.length; }, parseInt(fpsTog.value));
    }

    // Processing Engine
    function process(img, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const temp = document.createElement('canvas'); temp.width = W; temp.height = H;
        const tx = temp.getContext('2d');
        const scale = fitSl.value / 100;
        const ratio = ow / oh;
        let dw = (ratio > W/H) ? W*scale : (H*scale)*ratio;
        let dh = (ratio > W/H) ? (W*scale)/ratio : H*scale;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tol = accSl.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            if (Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2) < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = W; out.height = H;
        const ox = out.getContext('2d');
        if(shdSl.value > 0) { ox.shadowColor = `rgba(0,0,0,${shdSl.value/130})`; ox.shadowBlur = 15; ox.shadowOffsetY = 10; }
        
        const stroke = parseInt(strSl.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = cStr.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) sx.drawImage(temp, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(temp, 0, 0);
            ox.shadowColor = cGl.value; ox.shadowBlur = 25; ox.drawImage(sx.canvas, 0, 0);
        } else { ox.drawImage(temp, 0, 0); }
        return out;
    }

    function renderFrame() { if(frames.length) { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(process(frames[cur]), 0, 0); } }

    // FIXED DOWNLOAD ENGINE
    exportBtn.onclick = () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        exportBtn.disabled = true;

        const gif = new GIF({ 
            workers: 4, quality: 10, transparent: 'rgba(0,0,0,0)', 
            width: parseInt(wIn.value), height: parseInt(hIn.value),
            workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js' 
        });

        frames.forEach(f => gif.addFrame(process(f, true), {delay: parseInt(fpsTog.value), copy: true, disposal: 2}));

        gif.on('progress', p => pNum.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => { 
            const url = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = url; a.download = `pro_sticker_${Date.now()}.gif`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            loader.style.display = 'none'; exportBtn.disabled = false;
        });
        gif.render();
    };

    // UI Listeners
    [wIn, hIn].forEach(el => el.oninput = () => { canvas.width = wIn.value; canvas.height = hIn.value; renderFrame(); });
    fpsTog.onchange = startPlayback;
    [fitSl, accSl, shdSl, strSl].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + (el.id==='strSl'?'px':'%');
        renderFrame();
    });
    [cBg, cStr, cGl].forEach(el => el.oninput = renderFrame);
</script>
</body>
</html>
