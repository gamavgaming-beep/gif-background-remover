<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIPHY PRO STUDIO | ULTIMATE</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #6366f1;
            --dark-bg: #0b0f1a;
            --surface: rgba(23, 28, 41, 0.95);
            --border: rgba(255, 255, 255, 0.08);
        }

        /* Professional Animated BG */
        body {
            margin: 0; padding: 20px; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0b0f1a);
            color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .studio-header { text-align: center; margin-bottom: 25px; }
        .studio-header h1 {
            font-size: 28px; font-weight: 900; margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .app-shell {
            width: 100%; max-width: 480px; background: var(--surface);
            backdrop-filter: blur(20px); border-radius: 32px; padding: 24px;
            border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        /* Centered Viewport with Alpha Pattern */
        .preview-viewport {
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px; border-radius: 24px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 20px;
        }

        #hint { 
            position: absolute; color: #64748b; font-weight: 800; text-align: center; 
            font-size: 13px; z-index: 2; pointer-events: none;
        }

        canvas { max-width: 95%; max-height: 95%; z-index: 5; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }

        /* Meta Info Strip */
        .status-strip {
            display: flex; justify-content: space-between; background: rgba(0,0,0,0.3);
            padding: 10px 18px; border-radius: 12px; margin-bottom: 20px;
            font-size: 11px; font-weight: 700; color: var(--primary);
        }

        .control-panel {
            background: rgba(255,255,255,0.03); border-radius: 20px;
            padding: 18px; margin-bottom: 12px; border: 1px solid var(--border);
        }

        h3 { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin: 0 0 15px 0; letter-spacing: 1px; }

        /* Frame Rate Toggle (Select UI) */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 11px; color: #94a3b8; font-weight: 600; }
        select {
            background: #1a202c; color: #fff; border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; font-weight: 700; outline: none; cursor: pointer;
        }

        /* Sliders UI */
        .slider-row { margin-bottom: 15px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #2d3748; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; border: 3px solid #fff; cursor: pointer; }

        /* Color Section */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .color-node { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff; position: relative; overflow: hidden; margin: 0 auto; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 70px; height: 70px; cursor: pointer; }

        /* Professional Download Button */
        .btn-download {
            width: 100%; padding: 20px; background: linear-gradient(90deg, var(--primary), #00d472);
            color: #0b0f1a; border: none; border-radius: 20px; font-size: 15px;
            font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* Professional Progress UI */
        #progressOverlay {
            position: fixed; inset: 0; background: rgba(11, 15, 26, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .progress-container { width: 80%; max-width: 300px; text-align: center; }
        .progress-bar-bg { height: 6px; width: 100%; background: #1a202c; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #progressFill { height: 100%; width: 0%; background: var(--primary); transition: 0.2s; box-shadow: 0 0 15px var(--primary); }
        #progressPercent { font-size: 48px; font-weight: 900; color: var(--primary); margin: 0; }
    </style>
</head>
<body>

<div id="progressOverlay">
    <div class="progress-container">
        <p id="progressPercent">0%</p>
        <div class="progress-bar-bg"><div id="progressFill"></div></div>
        <p style="font-size: 11px; color: #64748b; letter-spacing: 2px; font-weight: 800;">PACKING YOUR STICKER...</p>
    </div>
</div>

<div class="studio-header">
    <h1>Giphy Pro Studio</h1>
</div>

<div class="app-shell">
    <div class="preview-viewport">
        <input type="file" id="gifInput" accept="image/gif">
        <canvas id="canvas"></canvas>
        <div id="hint">DROP GIF OR TAP TO LOAD</div>
    </div>

    <div class="status-strip">
        <span>RESOLUTION: <span id="infoRes">0x0</span></span>
        <span>FRAMES: <span id="infoFrames">0</span></span>
    </div>

    <div class="control-panel">
        <h3>Frame Configuration</h3>
        <div class="input-group">
            <label>Select Frame Rate (FPS)</label>
            <select id="fpsSelect">
                <option value="80">12 fps</option>
                <option value="66">15 fps</option>
                <option value="55">18 fps</option>
                <option value="50">20 fps</option>
                <option value="41">24 fps</option>
                <option value="40">25 fps</option>
                <option value="33" selected>30 fps</option>
            </select>
        </div>
    </div>

    <div class="control-panel">
        <h3>Object & FX</h3>
        <div class="slider-row">
            <div class="slider-header"><span>Alpha Accuracy</span><span id="accVal">45%</span></div>
            <input type="range" id="accSl" min="0" max="100" value="45">
        </div>
        <div class="slider-row">
            <div class="slider-header"><span>Shadow Depth</span><span id="shdVal">40%</span></div>
            <input type="range" id="shdSl" min="0" max="100" value="40">
        </div>
        <div class="slider-row">
            <div class="slider-header"><span>Stroke Width</span><span id="strVal">10px</span></div>
            <input type="range" id="strSl" min="0" max="40" value="10">
        </div>
    </div>

    <div class="color-grid">
        <div class="color-node"><input type="color" id="cBg" value="#ffffff"></div>
        <div class="color-node"><input type="color" id="cStr" value="#ffffff"></div>
        <div class="color-node"><input type="color" id="cGlw" value="#6366f1"></div>
    </div>
    <br>
    <button class="btn-download" id="btnExport">Generate Master Sticker</button>
</div>

<script>
    const input = document.getElementById('gifInput'), cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
    const fpsSel = document.getElementById('fpsSelect'), accSl = document.getElementById('accSl'), shdSl = document.getElementById('shdSl'), strSl = document.getElementById('strSl');
    const cBg = document.getElementById('cBg'), cStr = document.getElementById('cStr'), cGlw = document.getElementById('cGlw');
    const expBtn = document.getElementById('btnExport'), overlay = document.getElementById('progressOverlay'), pFill = document.getElementById('progressFill'), pTxt = document.getElementById('progressPercent');

    let frames = [], cur = 0, timer = null, ow, oh;

    input.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('hint').style.display = 'none';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('infoRes').innerText = ow+'x'+oh;
        document.getElementById('infoFrames').innerText = frames.length;
        cvs.width = 512; cvs.height = 512;
        startPlayback();
    };

    function startPlayback() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => { render(); cur = (cur+1)%frames.length; }, parseInt(fpsSel.value));
    }

    function process(img, isFinal = false) {
        const W = 512, H = 512;
        const tC = document.createElement('canvas'); tC.width = W; tC.height = H;
        const tx = tC.getContext('2d');
        const ratio = ow / oh;
        let dw = (ratio > 1) ? W*0.7 : (H*0.7)*ratio;
        let dh = (ratio > 1) ? (W*0.7)/ratio : H*0.7;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(cBg.value.slice(1,3),16), g:parseInt(cBg.value.slice(3,5),16), b:parseInt(cBg.value.slice(5,7),16)};
        const tol = accSl.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            if (Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2) < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = W; out.height = H;
        const ox = out.getContext('2d');
        if(shdSl.value > 0) { ox.shadowColor = `rgba(0,0,0,${shdSl.value/130})`; ox.shadowBlur = 15; ox.shadowOffsetY = 8; }
        
        const stroke = parseInt(strSl.value);
        const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
        sx.fillStyle = cStr.value;
        for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) sx.drawImage(tC, x, y);
        sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
        sx.globalCompositeOperation = 'source-over'; sx.drawImage(tC, 0, 0);
        
        ox.shadowColor = cGlw.value; ox.shadowBlur = 25; ox.drawImage(sx.canvas, 0, 0);
        return out;
    }

    function render() { if(frames.length) { ctx.clearRect(0,0,512,512); ctx.drawImage(process(frames[cur]), 0, 0); } }

    expBtn.onclick = () => {
        if(!frames.length) return;
        overlay.style.display = 'flex';
        const gif = new GIF({ workers: 4, quality: 5, transparent: 'rgba(0,0,0,0)', width: 512, height: 512, workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js' });
        frames.forEach(f => gif.addFrame(process(f, true), {delay: parseInt(fpsSel.value), copy: true, disposal: 2}));
        gif.on('progress', p => { const pct = Math.round(p*100); pTxt.innerText = pct+'%'; pFill.style.width = pct+'%'; });
        gif.on('finished', b => { 
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pro_sticker.gif'; a.click();
            overlay.style.display = 'none'; pFill.style.width = '0%';
        });
        gif.render();
    };

    fpsSel.onchange = startPlayback;
    [accSl, shdSl, strSl].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('Sl','Val')).innerText = el.value + (el.id==='strSl'?'px':'%');
        render();
    });
    [cBg, cStr, cGlw].forEach(el => el.oninput = render);
</script>
</body>
</html>
