<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Sticker Studio</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #00ff62; --bg: #e3f2fd; --card: #1c1c1e; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* பழைய ஸ்கிரீன் டிசைன் - Original Screen Resize Look */
        .container { width: 100%; max-width: 480px; background: #000000; border-radius: 28px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid #333; }
        
        .preview-area { 
            width: 100%; aspect-ratio: 1/1; background-color: #fff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #444; margin-bottom: 20px; display: grid; place-items: center; 
        }
        #fileInput { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        canvas { position: absolute; max-width: 100%; max-height: 100%; z-index: 5; }
        
        .status-bar { display: flex; justify-content: space-between; background: #1a1a1a; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; font-size: 11px; font-weight: bold; color: var(--primary); border: 1px solid #333; }

        .panel { background: #111111; padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #222; }
        h3 { font-size: 12px; margin: 0 0 12px 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        label { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 6px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); height: 5px; cursor: pointer; }

        /* Resolution Input Row */
        .res-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .res-box { background: #1a1a1a; padding: 8px 12px; border-radius: 10px; border: 1px solid #333; }
        .res-box span { font-size: 9px; color: #666; display: block; }
        .res-box input { background: none; border: none; color: white; font-weight: bold; width: 100%; outline: none; }

        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .mode-box { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; flex: 1; display: flex; align-items: center; justify-content: space-between; }
        
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #444; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Modified Color Picker Design */
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .color-item { display: flex; flex-direction: column; align-items: center; }
        .picker-ring { width: 42px; height: 42px; border-radius: 50%; border: 3px solid #333; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input[type="color"] { position: absolute; top: -10px; left: -10px; width: 60px; height: 60px; border: none; cursor: pointer; }
        .color-item span { font-size: 8px; color: #888; margin-top: 6px; font-weight: bold; text-align: center; line-height: 1.2; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; font-size: 14px; cursor: pointer; background: var(--primary); color: #000; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-main:active { transform: scale(0.98); }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loader"><h1 id="prog" style="color:var(--primary); font-size: 40px;">0%</h1><p>Processing Your Sticker...</p></div>

<div class="container">
    <div class="preview-area">
        <input type="file" id="fileInput" accept="image/gif">
        <canvas id="c"></canvas>
        <div id="h" style="font-weight: bold; color: #555;">Tap to Load GIF</div>
    </div>

    <div class="status-bar">
        <span>SIZE: <span id="rI">0x0</span></span>
        <span>FRAMES: <span id="fC">0</span></span>
    </div>

    <div class="panel">
        <h3>Resolution & Frame Rate</h3>
        <div class="res-row">
            <div class="res-box"><span>Width</span><input type="number" id="wIn" value="512"></div>
            <div class="res-box"><span>Height</span><input type="number" id="hIn" value="512"></div>
        </div>
        <label>Frame Rate Resolution <span id="sV">30ms</span></label>
        <input type="range" id="sS" min="10" max="200" value="30">
    </div>

    <div class="panel">
        <h3>Object Accuracy</h3>
        <label>Object Fit (Safe Area) <span id="fitV">70%</span></label>
        <input type="range" id="fitS" min="20" max="95" value="70">
        
        <label style="margin-top:10px;">Alpha Accuracy (Removal) <span id="accV">45%</span></label>
        <input type="range" id="accS" min="0" max="100" value="45">
    </div>

    <div class="panel">
        <h3>Visual FX & Colors</h3>
        <div class="flex-row">
            <div class="mode-box">
                <span style="font-size:10px; font-weight:bold;">ANIMATED RGB</span>
                <label class="switch"><input type="checkbox" id="rgb"><span class="slider"></span></label>
            </div>
            <div class="mode-box">
                <span style="font-size:10px; font-weight:bold;">SHADOW DEPTH</span>
                <input type="range" id="shS" min="0" max="100" value="40" style="width:50px">
            </div>
        </div>

        <label>Outline Width <span id="wV">10px</span></label>
        <input type="range" id="wS" min="0" max="40" value="10">

        <div class="color-grid">
            <div class="color-item"><div class="picker-ring"><input type="color" id="bgC" value="#ffffff"></div><span>BG CLEAN</span></div>
            <div class="color-item"><div class="picker-ring"><input type="color" id="stC" value="#ffffff"></div><span>STROKE</span></div>
            <div class="color-item"><div class="picker-ring"><input type="color" id="glC" value="#00ff62"></div><span>GLOW</span></div>
        </div>
    </div>

    <button class="btn-main" id="dl">Download Giphy Sticker</button>
</div>

<script>
    const up = document.getElementById('fileInput'), c = document.getElementById('c'), ctx = c.getContext('2d');
    const wIn = document.getElementById('wIn'), hIn = document.getElementById('hIn'), sS = document.getElementById('sS');
    const fitS = document.getElementById('fitS'), accS = document.getElementById('accS'), wS = document.getElementById('wS'), shS = document.getElementById('shS');
    const rgb = document.getElementById('rgb'), bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), glC = document.getElementById('glC');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], cur = 0, tid = null, ow, oh;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('h').style.display = 'none';
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        ow = frames[0].width; oh = frames[0].height;
        document.getElementById('rI').innerText = ow+'x'+oh;
        document.getElementById('fC').innerText = frames.length;
        c.width = wIn.value; c.height = hIn.value;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { render(); cur = (cur+1)%frames.length; }, sS.value);
        loader.style.display = 'none';
    };

    function process(img, idx, isFinal = false) {
        const W = parseInt(wIn.value), H = parseInt(hIn.value);
        const tc = document.createElement('canvas'); tc.width = W; tc.height = H;
        const tx = tc.getContext('2d');
        const sc = fitS.value / 100;
        const aspect = ow / oh;
        let dw = (aspect > W/H) ? W*sc : (H*sc)*aspect;
        let dh = (aspect > W/H) ? (W*sc)/aspect : H*sc;
        tx.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);

        // Accurate Background Removal Logic (From Old Source)
        const id = tx.getImageData(0,0,W,H), d = id.data;
        const target = {r:parseInt(bgC.value.slice(1,3),16), g:parseInt(bgC.value.slice(3,5),16), b:parseInt(bgC.value.slice(5,7),16)};
        const tol = accS.value * 2.55;
        for (let i = 0; i < d.length; i += 4) {
            const dist = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (dist < tol) d[i+3] = 0;
            else if (isFinal) d[i+3] = 255;
        }
        tx.putImageData(id, 0, 0);

        const out = document.createElement('canvas'); out.width = W; out.height = H;
        const ox = out.getContext('2d');
        let glow = glC.value; if(rgb.checked) glow = `hsl(${(idx*15)%360},100%,50%)`;

        if(shS.value > 0) { ox.shadowColor = `rgba(0,0,0,${shS.value/100})`; ox.shadowBlur = 15; ox.shadowOffsetY = 8; }
        
        const stroke = parseInt(wS.value);
        if(stroke > 0) {
            const sx = document.createElement('canvas').getContext('2d'); sx.canvas.width = W; sx.canvas.height = H;
            sx.fillStyle = rgb.checked ? glow : stC.value;
            for(let x=-stroke; x<=stroke; x+=2) for(let y=-stroke; y<=stroke; y+=2) if(x*x+y*y <= stroke*stroke) sx.drawImage(tc, x, y);
            sx.globalCompositeOperation = 'source-in'; sx.fillRect(0,0,W,H);
            sx.globalCompositeOperation = 'source-over'; sx.drawImage(tc, 0, 0);
            ox.shadowColor = glow; ox.shadowBlur = 20; ox.drawImage(sx.canvas, 0, 0);
        } else { ox.drawImage(tc, 0, 0); }
        return out;
    }

    function render() { if(frames.length) { ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(process(frames[cur], cur), 0, 0); } }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const gif = new GIF({ workers: 4, quality: 5, workerScript: URL.createObjectURL(await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob())), transparent: 'rgba(0,0,0,0)', width: c.width, height: c.height });
        frames.forEach((f, i) => gif.addFrame(process(f, i, true), {delay: sS.value, copy: true, disposal: 2}));
        gif.on('progress', p => prog.innerText = Math.round(p*100)+'%');
        gif.on('finished', b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pro_sticker.gif'; a.click(); loader.style.display = 'none'; });
        gif.render();
    };

    [wIn, hIn, sS, fitS, accS, wS, shS, bgC, stC, glC, rgb].forEach(el => el.oninput = () => {
        const v = document.getElementById(el.id.replace('S','V')); if(v) v.innerText = el.value + (el.id==='wS'?'px':(el.id==='sS'?'ms':'%'));
        c.width = wIn.value; c.height = hIn.value;
        if(el.id==='sS' && tid) { clearInterval(tid); tid = setInterval(() => { render(); cur = (cur+1)%frames.length; }, sS.value); }
        render();
    });
</script>
</body>
</html>
