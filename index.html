<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GIF Sticker Maker - All Features</title>
    
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    
    <style>
        :root { --blue: #4a90e2; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        
        /* Card Layout */
        .card { background: white; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 15px; border: 1px solid #eee; }
        h2 { font-size: 14px; background: #fff; color: var(--blue); padding: 15px; margin: 0; text-align: center; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; }
        
        /* Preview Styling */
        .preview-area { 
            width: 100%; height: 320px; position: relative; 
            background-color: #e5e5e5;
            background-image: linear-gradient(45deg, #d1d1d1 25%, transparent 25%), linear-gradient(-45deg, #d1d1d1 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #d1d1d1 75%), linear-gradient(-45deg, transparent 75%, #d1d1d1 75%);
            background-size: 20px 20px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        canvas { max-width: 98%; max-height: 98%; image-rendering: pixelated; transition: 0.2s; }

        /* Buttons */
        .btn-row { background: var(--blue); display: flex; padding: 12px; gap: 8px; }
        button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px; font-size: 13px; border-radius: 8px; flex: 1; font-weight: 600; cursor: pointer; }
        button:active { transform: scale(0.98); background: rgba(255,255,255,0.3); }

        /* Controls */
        .settings { padding: 20px; }
        .control-item { margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 8px; }
        label span { color: var(--blue); }
        
        input[type="range"] { width: 100%; height: 6px; background: #ddd; border-radius: 5px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--blue); border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        input[type="color"] { width: 100%; height: 45px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; background: none; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="prog" style="margin-top:20px; font-size:24px; font-weight: bold; color: var(--blue);">0%</div>
    <p>Processing Your GIF...</p>
</div>

<div class="card">
    <h2>Ultra-Accurate GIF Preview</h2>
    <div class="preview-area">
        <canvas id="c1"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    <div class="btn-row">
        <button onclick="document.getElementById('up').click()">Upload GIF</button>
        <button id="dl">Download Result</button>
    </div>
</div>

<div class="card settings">
    <div class="grid-2">
        <div class="control-item">
            <label>Pick BG Color</label>
            <input type="color" id="bgC" value="#00ff00">
        </div>
        <div class="control-item">
            <label>Stroke Color</label>
            <input type="color" id="stC" value="#ffffff">
        </div>
    </div>

    <div class="control-item">
        <label>Accuracy (Tolerance) <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">
    </div>

    <div class="control-item">
        <label>Edge Feather (Softness) <span id="fV">2</span></label>
        <input type="range" id="fS" min="0" max="30" value="2">
    </div>

    <div class="control-item">
        <label>Edge Shrink (Erosion) <span id="eV">0</span>px</label>
        <input type="range" id="eS" min="0" max="5" value="0">
    </div>

    <div class="control-item">
        <label>Edge Stroke Width <span id="wV">0</span>px</label>
        <input type="range" id="wS" min="0" max="20" value="0">
    </div>
</div>

<script>
    const up = document.getElementById('up'), c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), tS = document.getElementById('tS');
    const fS = document.getElementById('fS'), eS = document.getElementById('eS'), wS = document.getElementById('wS');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], delays = [], cur = 0, tid = null;

    up.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.
