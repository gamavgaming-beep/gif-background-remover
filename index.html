<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Accurate GIF BG Remover</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --blue: #4a90e2; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 15px; }
        h2 { font-size: 14px; background: white; color: var(--blue); padding: 15px; margin: 0; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .preview-area { width: 100%; height: 320px; position: relative; background: #e5e5e5; background-image: radial-gradient(#d1d1d1 15%, transparent 15%); background-size: 15px 15px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 98%; max-height: 98%; border-radius: 5px; }
        .btn-row { background: var(--blue); display: flex; padding: 12px; gap: 8px; }
        button { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 12px; font-size: 13px; border-radius: 8px; flex: 1; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: rgba(255,255,255,0.3); }
        .settings { padding: 20px; }
        .control-group { margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #555; }
        label span { color: var(--blue); }
        input[type="range"] { width: 100%; height: 6px; background: #ddd; border-radius: 5px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--blue); border-radius: 50%; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .cp-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="color"] { flex: 1; height: 45px; border: 2px solid #f0f0f0; border-radius: 10px; cursor: pointer; background: none; }
        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="prog" style="margin-top:20px; font-size:24px; font-weight: bold; color: var(--blue);">0%</div>
    <p style="color: #666;">Rendering Ultra-HD GIF...</p>
</div>

<div class="card">
    <h2>Advanced GIF Preview</h2>
    <div class="preview-area">
        <canvas id="c1"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    <div class="btn-row">
        <button onclick="document.getElementById('up').click()">Upload New GIF</button>
        <button id="dl">Export Transparent GIF</button>
    </div>
</div>

<div class="card settings">
    <div class="cp-row">
        <div style="flex:1"><label>Pick BG</label><input type="color" id="bgC" value="#00ff00"></div>
        <div style="flex:1"><label>Stroke</label><input type="color" id="stC" value="#ffffff"></div>
    </div>

    <div class="control-group">
        <label>Main Accuracy (Tolerance) <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">
    </div>

    <div class="control-group">
        <label>Edge Smoothness (Feather) <span id="fV">2</span></label>
        <input type="range" id="fS" min="0" max="30" value="2">
    </div>

    <div class="control-group">
        <label>Edge Shrink (Erosion) <span id="eV">0</span>px</label>
        <input type="range" id="eS" min="0" max="5" value="0">
        <p style="font-size: 10px; color: #999; margin-top: 5px;">*பச்சை ஓரங்களை நீக்க இதை 1 அல்லது 2-ல் வைக்கவும்.</p>
    </div>

    <div class="control-group">
        <label>Stroke Width <span id="wV">0</span>px</label>
        <input type="range" id="wS" min="0" max="20" value="0">
    </div>
</div>

<script>
    const up = document.getElementById('up'), c1 = document.getElementById('c1'), ctx1 = c1.getContext('2d');
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), tS = document.getElementById('tS');
    const fS = document.getElementById('fS'), eS = document.getElementById('eS'), wS = document.getElementById('wS');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], delays = [], cur = 0, tid = null;

    up.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.delay * 10);
        c1.width = frames[0].width; c1.height = frames[0].height;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(cur); cur = (cur + 1) % frames.length; }, 100);
    };

    function process(img) {
        const tempC = document.createElement('canvas');
        tempC.width = c1.width; tempC.height = c1.height;
        const tx = tempC.getContext('2d');
        tx.drawImage(img, 0, 0);

        const id = tx.getImageData(0,0,tempC.width,tempC.height), d = id.data;
        const target = hex(bgC.value), tol = tS.value * 2.55, feather = fS.value * 2;
        const shrink = parseInt(eS.value);

        // 1. Precise Alpha Removal
        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (diff < tol + feather) d[i+3] = ((diff - tol) / feather) * 255;
        }
        tx.putImageData(id, 0, 0);

        // 2. Edge Shrink Logic (Erosion)
        if (shrink > 0) {
            tx.globalCompositeOperation = 'destination-out';
            for (let x = -shrink; x <= shrink; x++) {
                for (let y = -shrink; y <= shrink; y++) {
                    if (x !== 0 || y !== 0) tx.drawImage(tempC, x, y);
                }
            }
            tx.globalCompositeOperation = 'source-over';
        }

        // 3. Pro Stroke Logic
        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const outC = document.createElement('canvas');
            outC.width = tempC.width; outC.height = tempC.height;
            const ox = outC.getContext('2d');
            for (let x = -stroke; x <= stroke; x++) {
                for (let y = -stroke; y <= stroke; y++) {
                    if (x*x+y*y <= stroke*stroke) ox.drawImage(tempC, x, y);
                }
            }
            ox.globalCompositeOperation = 'source-in';
            ox.fillStyle = stC.value;
            ox.fillRect(0,0,outC.width,outC.height);
            ox.globalCompositeOperation = 'destination-over';
            ox.drawImage(tempC, 0, 0);
            return outC;
        }
        return tempC;
    }

    function draw(i) {
        const p = process(frames[i]);
        ctx1.clearRect(0,0,c1.width, c1.height);
        ctx1.drawImage(p, 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const u = URL.createObjectURL(b);
        const gif = new GIF({ workers: 2, quality: 3, workerScript: u, transparent: 'rgba(0,0,0,0)', width: c1.width, height: c1.height });
        frames.forEach((f, i) => gif.addFrame(process(f), {delay: delays[i], copy: true}));
        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = "ultra_hd_transparent.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hex(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }
    
    [tS, fS, eS, wS].forEach(el => {
        el.oninput = () => {
            document.getElementById(el.id.replace('S', 'V')).innerText = el.value + (el.id === 'tS' ? '%' : (el.id === 'fS' ? '' : 'px'));
            if(frames.length) draw(cur);
        }
    });
</script>
</body>
</html>
