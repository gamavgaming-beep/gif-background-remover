<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional GIF Sticker Maker</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .preview-window { width: 100%; height: 350px; background: #ddd; background-image: repeating-conic-gradient(#fff 0 90deg, #c1c1c1 0 180deg); background-size: 20px 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #eee; margin-bottom: 20px; }
        canvas { max-width: 100%; max-height: 100%; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; margin-bottom: 15px; accent-color: var(--primary); }
        input[type="color"] { width: 100%; height: 40px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; transition: 0.3s; }
        .btn-upload { background: var(--primary); color: white; }
        .btn-download { background: #28a745; color: white; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="progressText">0%</h1>
    <p>Generating High Quality Sticker...</p>
</div>

<div class="app-container">
    <div class="preview-window">
        <canvas id="mainCanvas"></canvas>
        <input type="file" id="fileInput" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    
    <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">UPLOAD GIF</button>
    <button class="btn btn-download" id="downloadBtn">DOWNLOAD STICKER</button>

    <div class="controls-grid">
        <div><label>Remove Background</label><input type="color" id="bgColor" value="#ffffff"></div>
        <div><label>Stroke Color</label><input type="color" id="strokeColor" value="#000000"></div>
    </div>

    <label>Accuracy (Tolerance): <span id="tolVal">45%</span></label>
    <input type="range" id="tolSlider" min="0" max="100" value="45">

    <label>Edge Smooth (Feather): <span id="featVal">2</span></label>
    <input type="range" id="featSlider" min="0" max="30" value="2">

    <label>Edge Shrink: <span id="shrinkVal">0px</span></label>
    <input type="range" id="shrinkSlider" min="0" max="5" value="0">

    <label>Stroke Width: <span id="widthVal">6px</span></label>
    <input type="range" id="widthSlider" min="0" max="25" value="6">
</div>

<script>
    const fileInput = document.getElementById('fileInput'), canvas = document.getElementById('mainCanvas'), ctx = canvas.getContext('2d', {willReadFrequently: true});
    const bgColor = document.getElementById('bgColor'), strokeColor = document.getElementById('strokeColor'), tolSlider = document.getElementById('tolSlider'), featSlider = document.getElementById('featSlider'), shrinkSlider = document.getElementById('shrinkSlider'), widthSlider = document.getElementById('widthSlider');
    const downloadBtn = document.getElementById('downloadBtn'), loader = document.getElementById('loader'), progressText = document.getElementById('progressText');

    let frames = [], delays = [], currentFrame = 0, timer = null;

    fileInput.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.delay * 10);
        canvas.width = frames[0].width; canvas.height = frames[0].height;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { renderPreview(currentFrame); currentFrame = (currentFrame+1)%frames.length; }, 100);
        loader.style.display = 'none';
    };

    function process(img, isExport = false) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(img, 0, 0);

        const imageData = tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height), data = imageData.data;
        const target = hexToRgb(bgColor.value), tolerance = tolSlider.value * 2.55, feather = featSlider.value * 2;
        const shrink = parseInt(shrinkSlider.value);

        // 1. Remove BG with Feather logic
        for (let i = 0; i < data.length; i += 4) {
            const diff = Math.sqrt((data[i]-target.r)**2 + (data[i+1]-target.g)**2 + (data[i+2]-target.b)**2);
            if (diff < tolerance) data[i+3] = 0;
            else if (diff < tolerance + feather) {
                let alpha = ((diff - tolerance) / feather) * 255;
                // Important: GIFs need solid pixels for strokes to show up
                data[i+3] = isExport ? (alpha > 120 ? 255 : 0) : alpha;
            } else if (isExport) {
                data[i+3] = 255;
            }
        }
        tempCtx.putImageData(imageData, 0, 0);

        // 2. Edge Shrink
        if (shrink > 0) {
            tempCtx.globalCompositeOperation = 'destination-out';
            for (let x = -shrink; x <= shrink; x++) {
                for (let y = -shrink; y <= shrink; y++) {
                    if (x !== 0 || y !== 0) tempCtx.drawImage(tempCanvas, x, y);
                }
            }
            tempCtx.globalCompositeOperation = 'source-over';
        }

        // 3. Stroke Logic
        const strokeWidth = parseInt(widthSlider.value);
        if (strokeWidth > 0) {
            const strokeCanvas = document.createElement('canvas');
            strokeCanvas.width = tempCanvas.width; strokeCanvas.height = tempCanvas.height;
            const sCtx = strokeCanvas.getContext('2d');
            
            sCtx.fillStyle = strokeColor.value;
            for(let x = -strokeWidth; x <= strokeWidth; x++) {
                for(let y = -strokeWidth; y <= strokeWidth; y++) {
                    if(x*x + y*y <= strokeWidth*strokeWidth) sCtx.drawImage(tempCanvas, x, y);
                }
            }
            sCtx.globalCompositeOperation = 'source-in';
            sCtx.fillStyle = strokeColor.value;
            sCtx.fillRect(0,0,strokeCanvas.width, strokeCanvas.height);
            
            sCtx.globalCompositeOperation = 'source-over';
            sCtx.drawImage(tempCanvas, 0, 0);
            return strokeCanvas;
        }
        return tempCanvas;
    }

    function renderPreview(i) {
        if(!frames[i]) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(process(frames[i], false), 0, 0);
    }

    downloadBtn.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const workerBlob = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ 
            workers: 4, quality: 1, 
            workerScript: URL.createObjectURL(workerBlob), 
            transparent: 'rgba(0,0,0,0)',
            width: canvas.width, height: canvas.height 
        });

        frames.forEach((f, i) => {
            gif.addFrame(process(f, true), {delay: delays[i], copy: true, disposal: 2});
        });

        gif.on('progress', p => progressText.innerText = Math.round(p * 100) + "%");
        gif.on('finished', blob => {
            const link = document.createElement('a'); 
            link.href = URL.createObjectURL(blob); 
            link.download = "sticker_final.gif"; 
            link.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hexToRgb(hex) {
        return {r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16)};
    }

    [tolSlider, featSlider, shrinkSlider, widthSlider, bgColor, strokeColor].forEach(el => el.oninput = () => {
        const display = document.getElementById(el.id.replace('Slider', 'Val'));
        if(display) display.innerText = el.value + (el.id.includes('tol') ? '%' : (el.id.includes('feat') ? '' : 'px'));
        if(frames.length) renderPreview(currentFrame);
    });
</script>
</body>
</html>
