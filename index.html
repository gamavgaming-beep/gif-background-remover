<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Maker - Ultimate Stroke Fix</title>
    <script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 400px; }
        .preview-box { width: 100%; height: 300px; background: #eee; background-image: repeating-conic-gradient(#fff 0 90deg, #d5d5d5 0 180deg); background-size: 20px 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #ddd; }
        canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
        .controls { margin-top: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #444; margin-bottom: 5px; display: block; }
        input[type="range"] { width: 100%; accent-color: #007bff; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-up { background: #007bff; color: white; }
        .btn-dl { background: #28a745; color: white; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
    </style>
</head>
<body>

<div id="loader">
    <h1 id="prog">0%</h1>
    <p>உங்களுடைய ஸ்டிக்கர் தயாராகிறது...</p>
</div>

<div class="container">
    <div class="preview-box">
        <canvas id="c"></canvas>
        <input type="file" id="up" accept="image/gif" style="position:absolute; inset:0; opacity:0; cursor:pointer;">
    </div>
    
    <button class="btn btn-up" onclick="document.getElementById('up').click()">Upload Original GIF</button>
    <button class="btn btn-dl" id="dl">Download High-Quality Sticker</button>

    <div class="controls">
        <div class="row">
            <div><label>Remove BG</label><input type="color" id="bgC" value="#ffffff"></div>
            <div><label>Stroke Color</label><input type="color" id="stC" value="#000000"></div>
        </div>
        <label>Accuracy (Tolerance): <span id="tV">45%</span></label>
        <input type="range" id="tS" min="0" max="100" value="45">

        <label>Stroke Width: <span id="wV">6px</span></label>
        <input type="range" id="wS" min="0" max="25" value="6">
    </div>
</div>

<script>
    const up = document.getElementById('up'), c = document.getElementById('c'), ctx = c.getContext('2d', {willReadFrequently: true});
    const bgC = document.getElementById('bgC'), stC = document.getElementById('stC'), tS = document.getElementById('tS'), wS = document.getElementById('wS');
    const dl = document.getElementById('dl'), loader = document.getElementById('loader'), prog = document.getElementById('prog');

    let frames = [], delays = [], cur = 0, tid = null;

    up.onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        loader.style.display = 'flex';
        const res = await gifFrames({ url: URL.createObjectURL(file), frames: 'all', outputType: 'canvas' });
        frames = res.map(f => f.getImage());
        delays = res.map(f => f.frameInfo.delay * 10);
        c.width = frames[0].width; c.height = frames[0].height;
        if(tid) clearInterval(tid);
        tid = setInterval(() => { draw(cur); cur = (cur+1)%frames.length; }, 100);
        loader.style.display = 'none';
    };

    function processFrame(img, isExport = false) {
        const tc = document.createElement('canvas');
        tc.width = c.width; tc.height = c.height;
        const tx = tc.getContext('2d');
        tx.drawImage(img, 0, 0);

        const id = tx.getImageData(0,0,tc.width,tc.height), d = id.data;
        const target = hex(bgC.value), tol = tS.value * 2.55;

        // 1. Transparent Alpha Remove
        for (let i = 0; i < d.length; i += 4) {
            const diff = Math.sqrt((d[i]-target.r)**2 + (d[i+1]-target.g)**2 + (d[i+2]-target.b)**2);
            if (diff < tol) d[i+3] = 0;
            else if (isExport) d[i+3] = 255; // டவுன்லோட் போது 100% Solid
        }
        tx.putImageData(id, 0, 0);

        const stroke = parseInt(wS.value);
        if (stroke > 0) {
            const sc = document.createElement('canvas');
            sc.width = tc.width; sc.height = tc.height;
            const sx = sc.getContext('2d');
            
            // ஸ்ட்ரோக் லேயர் - தடிமனான அவுட்லைன்
            sx.fillStyle = stC.value;
            for(let x = -stroke; x <= stroke; x++) {
                for(let y = -stroke; y <= stroke; y++) {
                    if(x*x + y*y <= stroke*stroke) sx.drawImage(tc, x, y);
                }
            }
            
            // ஸ்ட்ரோக் நிறத்தை உறுதிப்படுத்துதல்
            sx.globalCompositeOperation = 'source-in';
            sx.fillStyle = stC.value;
            sx.fillRect(0,0,sc.width, sc.height);
            
            // அசல் எமோஜியை மேலே வரைதல்
            sx.globalCompositeOperation = 'source-over';
            sx.drawImage(tc, 0, 0);
            return sc;
        }
        return tc;
    }

    function draw(i) {
        if(!frames[i]) return;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(processFrame(frames[i], false), 0, 0);
    }

    dl.onclick = async () => {
        if(!frames.length) return;
        loader.style.display = 'flex';
        const b = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
        const gif = new GIF({ 
            workers: 4, quality: 1, 
            workerScript: URL.createObjectURL(b), 
            transparent: 'rgba(0,0,0,0)',
            width: c.width, height: c.height 
        });

        frames.forEach((f, i) => {
            gif.addFrame(processFrame(f, true), {delay: delays[i], copy: true, disposal: 2});
        });

        gif.on('progress', p => prog.innerText = Math.round(p * 100) + "%");
        gif.on('finished', b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "Fixed_Sticker.gif"; a.click();
            loader.style.display = 'none';
        });
        gif.render();
    };

    function hex(h) { return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}; }
    [tS, wS, bgC, stC].forEach(el => el.oninput = () => {
        document.getElementById(el.id.replace('S', 'V')).innerText = el.value + (el.id === 'wS' ? 'px' : '%');
        if(frames.length) draw(cur);
    });
</script>
</body>
</html>
