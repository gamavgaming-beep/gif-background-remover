<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giphy Sticker Studio</title>

<script src="https://unpkg.com/gif-frames/dist/gif-frames.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<style>
body{background:#0a0a0a;color:white;font-family:sans-serif;text-align:center}
canvas{max-width:100%}
</style>
</head>

<body>

<input type="file" id="up" accept="image/gif">
<br><br>

<canvas id="c"></canvas>

<br><br>

Stroke Width
<input type="range" id="wS" min="0" max="30" value="8">

<br><br>

<button id="dl">Export Transparent GIF</button>

<script>

const up=document.getElementById("up");
const c=document.getElementById("c");
const ctx=c.getContext("2d");

const wS=document.getElementById("wS");
const dl=document.getElementById("dl");

let frames=[];
let cur=0;
let loop=null;

c.width=500;
c.height=500;

up.onchange=async e=>{

const file=e.target.files[0];
if(!file) return;

const res=await gifFrames({
url:URL.createObjectURL(file),
frames:"all",
outputType:"canvas"
});

frames=res.map(f=>f.getImage());

startLoop();

};

function startLoop(){

if(loop) clearInterval(loop);

loop=setInterval(()=>{

draw();

cur=(cur+1)%frames.length;

},100);

}

function process(img,isExport=false){

const size=c.width;

const tc=document.createElement("canvas");
tc.width=size;
tc.height=size;

const tx=tc.getContext("2d");

tx.clearRect(0,0,size,size);

tx.drawImage(img,0,0,size,size);

const stroke=parseInt(wS.value);

if(stroke>0){

const sc=document.createElement("canvas");
sc.width=size;
sc.height=size;

const sx=sc.getContext("2d");

sx.fillStyle="#000";

for(let x=-stroke;x<=stroke;x++){
for(let y=-stroke;y<=stroke;y++){

if(x*x+y*y<=stroke*stroke){

sx.drawImage(tc,x,y);

}

}
}

sx.globalCompositeOperation="source-in";

sx.fillRect(0,0,size,size);

sx.globalCompositeOperation="source-over";

sx.drawImage(tc,0,0);

return sc;

}

return tc;

}

function draw(){

if(!frames[cur]) return;

ctx.clearRect(0,0,c.width,c.height);

const frame=process(frames[cur],false);

ctx.drawImage(frame,0,0);

}

dl.onclick=async()=>{

if(!frames.length) return;

const worker=await fetch("https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js")
.then(r=>r.blob());

const gif=new GIF({

workers:4,
quality:5,
workerScript:URL.createObjectURL(worker),
transparent:"rgba(0,0,0,0)",
width:c.width,
height:c.height

});

frames.forEach(f=>{

const frameCanvas=process(f,true);

const temp=document.createElement("canvas");
temp.width=frameCanvas.width;
temp.height=frameCanvas.height;

const tctx=temp.getContext("2d");

tctx.drawImage(frameCanvas,0,0);

gif.addFrame(tctx,{
delay:100,
copy:true
});

});

gif.on("finished",blob=>{

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="giphy_sticker.gif";

a.click();

});

gif.render();

};

</script>

</body>
</html>
